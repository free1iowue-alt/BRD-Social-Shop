<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrangeGlass POS & Shop Manager</title>
  
  <!-- Programmatic Silence for Tailwind CSS Production Warning -->
  <script>
    (function() {
      const originalWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) {
          return; // Ignore the Tailwind development-only warning
        }
        originalWarn.apply(console, args);
      };
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (Inter & JetBrains Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX Compilation -->
  <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, rgba(251, 146, 60, 0.12) 0%, rgba(0, 0, 0, 0) 80%),
                  linear-gradient(135deg, #120f0e 0%, #070505 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #f3f4f6;
      overflow-x: hidden;
    }

    /* Premium Glassmorphic Classes */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
    }

    .glass-panel-orange {
      background: rgba(251, 146, 60, 0.08);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid rgba(251, 146, 60, 0.25);
      box-shadow: 0 8px 32px 0 rgba(251, 146, 60, 0.1);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(251, 146, 60, 0.5);
      outline: none;
      box-shadow: 0 0 15px rgba(251, 146, 60, 0.15);
    }

    /* Legible Option Dropdowns (Fixes White Text Blank dropdown bug) */
    select option {
      background-color: #18181b !important;
      color: #ffffff !important;
    }

    /* Custom Hide Scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Bill Watermark Stamping styles */
    .watermark-rejected {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      font-size: 4rem;
      font-weight: 900;
      color: rgba(239, 68, 68, 0.15);
      border: 6px double rgba(239, 68, 68, 0.15);
      padding: 10px 30px;
      text-transform: uppercase;
      pointer-events: none;
      letter-spacing: 0.25rem;
      border-radius: 12px;
      z-index: 10;
    }

    @keyframes scale-up {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-scale-up {
      animation: scale-up 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Printer settings overrides */
    @media print {
      body * {
        visibility: hidden;
      }
      #print-area, #print-area * {
        visibility: visible;
      }
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        color: #000000 !important;
        background: #ffffff !important;
      }
      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background Orbs -->
  <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-600/10 blur-[120px] pointer-events-none z-0"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[55vw] h-[55vw] rounded-full bg-white/5 blur-[150px] pointer-events-none z-0"></div>

  <!-- Root Div Container -->
  <div id="root" class="relative z-10 min-h-screen flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const Icon = ({ name, className = "w-5 h-5", strokeWidth = 2 }) => {
      const icons = {
        shoppingCart: <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0" />,
        barChart: <path d="M3 3v18h18M18 17V9M12 17V5M6 17v-4" />,
        package: <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" />,
        fileText: <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z M14 2v4a2 2 0 0 0 2 2h4M10 9H8M16 13H8M16 17H8" />,
        settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
        wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 10h18v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z M16 16h2" />,
        folder: <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z" />,
        plus: <path d="M12 5v14M5 12h14" />,
        trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
        check: <path d="M20 6 9 17l-5-5" />,
        x: <path d="M18 6 6 18M6 6l12 12" />,
        printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />,
        phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
        user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
        shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
        menu: <path d="M4 12h16M4 6h16M4 18h16" />,
        info: <g><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01" /></g>,
        lock: <g><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></g>,
        search: <g><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></g>,
        upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
        truck: <g><rect x="1" y="3" width="15" height="13" /><polygon points="16 8 20 8 23 11 23 16 16 16" /><circle cx="5.5" cy="18.5" r="2.5" /><circle cx="18.5" cy="18.5" r="2.5" /></g>,
        star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
      };

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {icons[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    const defaultProductsList = [
      { id: "1", name: "Red Onion Premium", category: "Vegetables", baseUnit: "kg", basePrice: 60, hasSubUnit: true, subUnitName: "gram", subUnitFactor: 1000, stock: 120, minStock: 15, imageUrl: "https://images.unsplash.com/photo-1618213837799-25d5552420ab?w=120&auto=format&fit=crop" },
      { id: "2", name: "Fresh Potatoes", category: "Vegetables", baseUnit: "kg", basePrice: 40, hasSubUnit: true, subUnitName: "gram", subUnitFactor: 1000, stock: 250, minStock: 20, imageUrl: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=120&auto=format&fit=crop" },
      { id: "3", name: "Mustard Oil Pure", category: "Grocery", baseUnit: "Liter", basePrice: 180, hasSubUnit: true, subUnitName: "ml", subUnitFactor: 1000, stock: 45, minStock: 8, imageUrl: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=120&auto=format&fit=crop" }
    ];

    const defaultShopConfigObj = {
      name: "Abinash Rizal Shop",
      logo: "", 
      tagline: "Quality Groceries & POS Solutions",
      address: "12, Commercial Block, Sector-62, Noida, UP, India",
      phone: "+91 98765 43210",
      gstin: "09AAAAA1111A1Z1",
      upiIds: ["9242021022@fam", "9242021022@okaxis"],
      activeUpiId: "9242021022@fam",
      customCategories: ["Vegetables", "Grocery", "Dairy", "Beverages", "Spices", "Others"]
    };

    function App() {
      const [dirHandle, setDirHandle] = useState(null);
      const [isSynced, setIsSynced] = useState(false);
      const [syncLoading, setSyncLoading] = useState(false);
      const [syncStepText, setSyncStepText] = useState("");
      const [showPermissionPrompt, setShowPermissionPrompt] = useState(false);

      const [products, setProducts] = useState([]);
      const [sales, setSales] = useState([]);
      const [shopConfig, setShopConfig] = useState(defaultShopConfigObj);
      const [purchases, setPurchases] = useState([]);
      const [passbooks, setPassbooks] = useState([]);
      const [loans, setLoans] = useState([]);

      const [customDialog, setCustomDialog] = useState(null); 

      const [currentTab, setCurrentTab] = useState("pos"); 
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [toast, setToast] = useState(null);

      const [weightEntry, setWeightEntry] = useState("1"); 
      const [weightUnit, setWeightUnit] = useState("gram"); 
      const [manualTotalOverride, setManualTotalOverride] = useState(""); 
      const [manualTaxToggle, setManualTaxToggle] = useState(true); 

      const [cart, setCart] = useState([]);
      const [customerName, setCustomerName] = useState("");
      const [customerPhone, setCustomerPhone] = useState("");
      const [paymentMode, setPaymentMode] = useState("Cash"); 
      const [passbookCheckoutUid, setPassbookCheckoutUid] = useState("");

      const [activeReceipt, setActiveReceipt] = useState(null);
      const [receiptLayout, setReceiptLayout] = useState("A4"); 
      const [editingProduct, setEditingProduct] = useState(null);
      const [isProductModalOpen, setIsProductModalOpen] = useState(false);

      const [servicesTab, setServicesTab] = useState("passbook"); 
      const [selectedPassbookUid, setSelectedPassbookUid] = useState("");
      const [fetchedPassbook, setFetchedPassbook] = useState(null);
      const [passbookActionType, setPassbookActionType] = useState("deposit"); 
      const [passbookActionAmount, setPassbookActionAmount] = useState("");
      const [passbookActionPassword, setPassbookActionPassword] = useState("");

      const [newPassbook, setNewPassbook] = useState({
        name: "", address: "", phone: "", openingBal: "", password: "", expiryDate: ""
      });

      const [newLoan, setNewLoan] = useState({
        customerName: "", phone: "", principal: "", rate: "", period: "", payMode: "Cash", passbookUid: ""
      });
      const [loanRepayId, setLoanRepayId] = useState("");
      const [loanRepayAmount, setLoanRepayAmount] = useState("");
      const [loanRepayMode, setLoanRepayMode] = useState("Cash");

      const [newCategoryInput, setNewCategoryInput] = useState("");

      const [newPurchase, setNewPurchase] = useState({
        partyName: "", itemId: "", qty: "", unitName: "", costPrice: "", paymentStatus: "Fully Paid", paidAmount: ""
      });

      const [cornerAnimation, setCornerAnimation] = useState(null); 

      const [posSearch, setPosSearch] = useState("");
      const [posCategory, setPosCategory] = useState("All");

      const triggerCustomAlert = (title, message) => {
        return new Promise((resolve) => {
          setCustomDialog({
            type: 'alert',
            title,
            message,
            onResolve: () => {
              setCustomDialog(null);
              resolve();
            }
          });
        });
      };

      const triggerCustomConfirm = (title, message) => {
        return new Promise((resolve) => {
          setCustomDialog({
            type: 'confirm',
            title,
            message,
            onResolve: () => {
              setCustomDialog(null);
              resolve(true);
            },
            onReject: () => {
              setCustomDialog(null);
              resolve(false);
            }
          });
        });
      };

      const triggerCustomPrompt = (title, message, placeholder = "", defaultValue = "") => {
        return new Promise((resolve) => {
          setCustomDialog({
            type: 'prompt',
            title,
            message,
            placeholder,
            defaultValue,
            onResolve: (val) => {
              setCustomDialog(null);
              resolve(val);
            },
            onReject: () => {
              setCustomDialog(null);
              resolve(null);
            }
          });
        });
      };

      useEffect(() => {
        if (toast) {
          const timer = setTimeout(() => setToast(null), 3500);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
      };

      const runCornerSplash = (title, amount, type) => {
        setCornerAnimation({ title, amount, type });
        setTimeout(() => setCornerAnimation(null), 4500);
      };

      useEffect(() => {
        const attemptRestore = async () => {
          try {
            const db = await openIDB();
            const savedHandle = await getIDBVal(db, "dirHandle");
            if (savedHandle) {
              setDirHandle(savedHandle);
              setShowPermissionPrompt(true);
            }
          } catch (e) {
            console.error("Failed restoring directory handle", e);
          }
        };
        attemptRestore();
      }, []);

      const openIDB = () => {
        return new Promise((resolve, reject) => {
          try {
            if (!window.indexedDB) {
              reject(new Error("IndexedDB is not supported"));
              return;
            }
            const request = indexedDB.open("OrangeGlassPOS_DB_V2", 1);
            request.onupgradeneeded = (e) => {
              const db = e.target.result;
              db.createObjectStore("handles");
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
          } catch (err) {
            reject(err);
          }
        });
      };

      const setIDBVal = async (db, key, val) => {
        const tx = db.transaction("handles", "readwrite");
        tx.objectStore("handles").put(val, key);
        return tx.complete;
      };

      const getIDBVal = async (db, key) => {
        return new Promise((resolve, reject) => {
          const tx = db.transaction("handles", "readonly");
          const request = tx.objectStore("handles").get(key);
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });
      };

      const removeIDBVal = async (db, key) => {
        const tx = db.transaction("handles", "readwrite");
        tx.objectStore("handles").delete(key);
        return tx.complete;
      };

      const readFile = async (dirHandle, fileName, fallbackData) => {
        try {
          const fileHandle = await dirHandle.getFileHandle(fileName);
          const file = await fileHandle.getFile();
          const content = await file.text();
          return JSON.parse(content);
        } catch (error) {
          if (error.name === "NotFoundError") {
            await writeFile(dirHandle, fileName, fallbackData);
            return fallbackData;
          }
          throw error;
        }
      };

      const writeFile = async (dirHandle, fileName, data) => {
        try {
          const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(JSON.stringify(data, null, 2));
          await writable.close();
        } catch (error) {
          console.error("Error writing database file to system", error);
        }
      };

      const handleSelectFolder = async () => {
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
          setDirHandle(handle);
          try {
            const db = await openIDB();
            await setIDBVal(db, "dirHandle", handle);
          } catch (err) {
            console.warn("IndexDB failure", err);
          }
          await loadDataFromFolder(handle);
        } catch (error) {
          if (error.name !== "AbortError") {
            triggerToast("Folder loading aborted/failed", "error");
          }
        }
      };

      const loadDataFromFolder = async (handle) => {
        setSyncLoading(true);
        setIsSynced(false);
        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        try {
          setSyncStepText("Connecting to local storage folder...");
          await wait(500);

          const status = await handle.queryPermission({ mode: 'readwrite' });
          if (status !== 'granted') {
            const reqStatus = await handle.requestPermission({ mode: 'readwrite' });
            if (reqStatus !== 'granted') {
              throw new Error("Folder read/write consent rejected.");
            }
          }
          setSyncStepText("Permissions approved. Accessing database parameters...");
          await wait(400);

          setSyncStepText("Accessing shop_config.json...");
          const conf = await readFile(handle, "shop_config.json", defaultShopConfigObj);
          setShopConfig(conf);

          setSyncStepText("Accessing shop_products.json...");
          const prods = await readFile(handle, "shop_products.json", defaultProductsList);
          setProducts(prods);

          setSyncStepText("Accessing shop_sales.json...");
          const sls = await readFile(handle, "shop_sales.json", []);
          setSales(sls);

          setSyncStepText("Accessing shop_purchases.json...");
          const pur = await readFile(handle, "shop_purchases.json", []);
          setPurchases(pur);

          setSyncStepText("Accessing shop_passbooks.json...");
          const pb = await readFile(handle, "shop_passbooks.json", []);
          setPassbooks(pb);

          setSyncStepText("Accessing shop_loans.json...");
          const ln = await readFile(handle, "shop_loans.json", []);
          setLoans(ln);

          setSyncStepText("Synchronizing data arrays into virtual server memory...");
          await wait(500);

          setIsSynced(true);
          triggerToast("Sync Active! Local storage connected.", "success");
        } catch (error) {
          console.error(error);
          triggerToast(error.message || "Database synchronization failed", "error");
          setIsSynced(false);
        } finally {
          setSyncLoading(false);
          setShowPermissionPrompt(false);
        }
      };

      const disconnectFolder = async () => {
        const db = await openIDB();
        await removeIDBVal(db, "dirHandle");
        setDirHandle(null);
        setIsSynced(false);
        setProducts([]);
        setSales([]);
        setPurchases([]);
        setPassbooks([]);
        setLoans([]);
        setShopConfig(defaultShopConfigObj);
        triggerToast("Database unmounted. Files locked safely.", "warning");
      };

      const syncChanges = async (p, s, c, pur, pb, ln) => {
        if (!dirHandle || !isSynced) return;
        try {
          if (p) await writeFile(dirHandle, "shop_products.json", p);
          if (s) await writeFile(dirHandle, "shop_sales.json", s);
          if (c) await writeFile(dirHandle, "shop_config.json", c);
          if (pur) await writeFile(dirHandle, "shop_purchases.json", pur);
          if (pb) await writeFile(dirHandle, "shop_passbooks.json", pb);
          if (ln) await writeFile(dirHandle, "shop_loans.json", ln);
        } catch (err) {
          triggerToast("Failed writing updates. Ensure no program holds these files.", "error");
        }
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const MAX_WIDTH = 120;
            const MAX_HEIGHT = 120;
            canvas.width = MAX_WIDTH;
            canvas.height = MAX_HEIGHT;
            ctx.drawImage(img, 0, 0, MAX_WIDTH, MAX_HEIGHT);
            
            const compressedBase64 = canvas.toDataURL("image/jpeg", 0.85);
            setShopConfig(prev => ({ ...prev, logo: compressedBase64 }));
            triggerToast("Logo uploaded and optimized successfully", "success");
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const calculateItemCost = (product, enteredValue, unitType, manualPriceInput) => {
        if (manualPriceInput !== undefined && manualPriceInput !== "") {
          return parseFloat(manualPriceInput) || 0;
        }

        const value = parseFloat(enteredValue) || 0;
        if (unitType === product.baseUnit) {
          return parseFloat((product.basePrice * value).toFixed(2));
        } else if (product.hasSubUnit && unitType === product.subUnitName) {
          const pricePerSub = product.basePrice / product.subUnitFactor;
          return parseFloat((pricePerSub * value).toFixed(2));
        }
        return parseFloat((product.basePrice * value).toFixed(2));
      };

      const addItemToCart = (product) => {
        const cost = calculateItemCost(product, weightEntry, weightUnit, manualTotalOverride);
        const rateDetails = weightUnit === product.baseUnit 
          ? `₹${product.basePrice}/${product.baseUnit}` 
          : `₹${(product.basePrice / product.subUnitFactor).toFixed(3)}/${product.subUnitName}`;

        const cartItem = {
          product,
          quantity: parseFloat(weightEntry) || 1,
          selectedUnit: weightUnit,
          rateDetails,
          customPrice: manualTotalOverride ? parseFloat(manualTotalOverride) : null,
          totalCost: cost
        };

        setCart([...cart, cartItem]);
        setWeightEntry("1");
        setManualTotalOverride("");
        triggerToast(`${product.name} added to cart`, "success");
      };

      const removeFromCart = (index) => {
        setCart(cart.filter((_, i) => i !== index));
      };

      const completeCheckout = async (checkoutStatus = "Success") => {
        if (cart.length === 0) {
          triggerToast("Cart is empty", "warning");
          return;
        }

        const baseTotal = cart.reduce((sum, item) => sum + (item.totalCost || 0), 0);
        const taxAmount = manualTaxToggle ? parseFloat((baseTotal * 0.05).toFixed(2)) : 0;
        const grandTotal = baseTotal + taxAmount;

        let updatedPassbooks = [...(passbooks || [])];
        if (paymentMode === "Passbook" && checkoutStatus === "Success") {
          if (!passbookCheckoutUid) {
            triggerToast("Enter Passbook UID to complete check", "error");
            return;
          }
          const pBook = updatedPassbooks.find(p => p.uid === passbookCheckoutUid);
          if (!pBook) {
            triggerToast("Passbook not found with this UID", "error");
            return;
          }
          if (pBook.balance < grandTotal) {
            triggerToast(`Insufficient Passbook Balance (Bal: ₹${pBook.balance})`, "error");
            return;
          }
          pBook.balance = parseFloat((pBook.balance - grandTotal).toFixed(2));
          pBook.statement = [
            ...(pBook.statement || []),
            { date: new Date().toLocaleString("en-IN"), type: "CHECKOUT DEBIT", amount: grandTotal, balance: pBook.balance }
          ];
          triggerToast(`Passbook debited. Remaining: ₹${pBook.balance}`, "success");
        }

        let updatedProducts = [...(products || [])];
        if (checkoutStatus === "Success") {
          updatedProducts = products.map(p => {
            let totalDeducted = 0;
            cart.forEach(item => {
              if (item.product.id === p.id) {
                if (item.selectedUnit === p.baseUnit) {
                  totalDeducted += item.quantity;
                } else if (p.hasSubUnit && item.selectedUnit === p.subUnitName) {
                  totalDeducted += item.quantity / p.subUnitFactor;
                }
              }
            });
            return {
              ...p,
              stock: parseFloat(Math.max(0, p.stock - totalDeducted).toFixed(3))
            };
          });
        }

        const newInvoice = {
          id: "TXN-" + Date.now().toString().slice(-8),
          date: new Date().toLocaleString("en-IN"),
          customerName: customerName || "General Customer",
          customerPhone: customerPhone || "N/A",
          items: cart.map(item => ({
            name: item.product.name,
            unit: item.selectedUnit,
            quantity: item.quantity,
            rate: item.rateDetails,
            price: item.totalCost
          })),
          taxAmount,
          totalAmount: grandTotal,
          paymentMode: paymentMode,
          status: checkoutStatus
        };

        const updatedSales = [newInvoice, ...(sales || [])];
        setProducts(updatedProducts);
        setSales(updatedSales);
        setPassbooks(updatedPassbooks);

        await syncChanges(updatedProducts, updatedSales, null, null, updatedPassbooks, null);
        setActiveReceipt(newInvoice);

        setCart([]);
        setCustomerName("");
        setCustomerPhone("");
        setPassbookCheckoutUid("");

        if (checkoutStatus === "Success") {
          runCornerSplash("POS TRANSACTION COMPLETED", `₹${grandTotal.toFixed(2)}`, "Success");
        } else {
          runCornerSplash("TRANSACTION CANCELLED / REJECTED", `₹${grandTotal.toFixed(2)}`, "Cancelled");
        }
      };

      const saveProductDetails = async (e) => {
        e.preventDefault();
        let updatedList;
        if (editingProduct.id) {
          updatedList = products.map(p => p.id === editingProduct.id ? editingProduct : p);
          triggerToast("Product details updated", "success");
        } else {
          const newItem = { ...editingProduct, id: "PROD-" + Date.now().toString().slice(-6) };
          updatedList = [...products, newItem];
          triggerToast("New stock added successfully", "success");
        }
        setProducts(updatedList);
        setIsProductModalOpen(false);
        setEditingProduct(null);
        await syncChanges(updatedList, null, null, null, null, null);
      };

      const deleteProductDetails = async (id) => {
        const proceed = await triggerCustomConfirm("Delete Item?", "Are you sure you want to delete this product from your inventory files?");
        if (proceed) {
          const updated = products.filter(p => p.id !== id);
          setProducts(updated);
          triggerToast("Product removed", "warning");
          await syncChanges(updated, null, null, null, null, null);
        }
      };

      const executeInventoryRefill = async (e) => {
        e.preventDefault();
        if (!newPurchase.itemId || !newPurchase.qty || !newPurchase.costPrice) {
          triggerToast("Please fill in refill parameters correctly", "warning");
          return;
        }

        const selectedItem = products.find(p => p.id === newPurchase.itemId);
        if (!selectedItem) return;

        const refillQtyVal = parseFloat(newPurchase.qty);
        const purchaseTotal = parseFloat(newPurchase.costPrice) * refillQtyVal;
        const paidVal = newPurchase.paymentStatus === "Fully Paid" ? purchaseTotal : parseFloat(newPurchase.paidAmount || 0);
        const dueVal = purchaseTotal - paidVal;

        const updatedProducts = products.map(p => {
          if (p.id === selectedItem.id) {
            return {
              ...p,
              stock: parseFloat((p.stock + refillQtyVal).toFixed(3))
            };
          }
          return p;
        });

        const purchaseRecord = {
          id: "PUR-" + Date.now().toString().slice(-6),
          date: new Date().toLocaleString("en-IN"),
          partyName: newPurchase.partyName || "Unregistered Party",
          itemName: selectedItem.name,
          quantity: refillQtyVal,
          unitName: newPurchase.unitName || selectedItem.baseUnit, 
          totalCost: purchaseTotal,
          paymentStatus: newPurchase.paymentStatus,
          paidAmount: paidVal,
          dueAmount: dueVal
        };

        const updatedPurchases = [purchaseRecord, ...(purchases || [])];
        setProducts(updatedProducts);
        setPurchases(updatedPurchases);

        setNewPurchase({
          partyName: "", itemId: "", qty: "", unitName: "", costPrice: "", paymentStatus: "Fully Paid", paidAmount: ""
        });

        await syncChanges(updatedProducts, null, null, updatedPurchases, null, null);
        triggerToast("Stock refill log recorded and stock values added!", "success");
      };

      const createPassbookAccount = async (e) => {
        e.preventDefault();
        if (!newPassbook.name || !newPassbook.password) {
          triggerToast("Passbook name and passwords are mandatory", "warning");
          return;
        }

        const uid = "PB-" + Math.floor(100000 + Math.random() * 900000);
        const passbookRecord = {
          uid,
          name: newPassbook.name,
          address: newPassbook.address || "N/A",
          phone: newPassbook.phone || "N/A",
          balance: parseFloat(newPassbook.openingBal || 0),
          password: newPassbook.password,
          expiryDate: newPassbook.expiryDate || new Date(Date.now() + 365*24*60*60*1000).toLocaleDateString(),
          statement: [
            { date: new Date().toLocaleString("en-IN"), type: "Opening", amount: parseFloat(newPassbook.openingBal || 0), balance: parseFloat(newPassbook.openingBal || 0) }
          ]
        };

        const updatedPassbooks = [...(passbooks || []), passbookRecord];
        setPassbooks(updatedPassbooks);
        await syncChanges(null, null, null, null, updatedPassbooks, null);

        setNewPassbook({ name: "", address: "", phone: "", openingBal: "", password: "", expiryDate: "" });
        triggerCustomAlert("Account Created", `Passbook registered! User ID / Code: ${uid}`);
      };

      const handleFetchPassbook = () => {
        const found = (passbooks || []).find(p => p.uid === selectedPassbookUid);
        if (!found) {
          triggerToast("No Passbook found with this UID", "error");
          setFetchedPassbook(null);
          return;
        }
        setFetchedPassbook(found);
      };

      const executePassbookAction = async () => {
        if (!fetchedPassbook || !passbookActionAmount) return;
        const amount = parseFloat(passbookActionAmount);

        if (passbookActionType === "withdraw") {
          if (fetchedPassbook.password !== passbookActionPassword) {
            triggerToast("Incorrect Passbook PIN/Password", "error");
            return;
          }
          if (fetchedPassbook.balance < amount) {
            triggerToast("Insufficient passbook funds", "error");
            return;
          }
        }

        const updatedPassbooks = (passbooks || []).map(p => {
          if (p.uid === fetchedPassbook.uid) {
            const newBalance = passbookActionType === "deposit" 
              ? parseFloat((p.balance + amount).toFixed(2))
              : parseFloat((p.balance - amount).toFixed(2));
            
            return {
              ...p,
              balance: newBalance,
              statement: [
                ...(p.statement || []),
                { date: new Date().toLocaleString("en-IN"), type: passbookActionType.toUpperCase(), amount, balance: newBalance }
              ]
            };
          }
          return p;
        });

        setPassbooks(updatedPassbooks);
        await syncChanges(null, null, null, null, updatedPassbooks, null);
        
        setFetchedPassbook(updatedPassbooks.find(p => p.uid === fetchedPassbook.uid));
        setPassbookActionAmount("");
        setPassbookActionPassword("");
        triggerToast("Passbook Ledger statement updated successfully", "success");
      };

      const executeLoanDisbursement = async (e) => {
        e.preventDefault();
        const principalVal = parseFloat(newLoan.principal);
        const rateVal = parseFloat(newLoan.rate || 0);
        const periodVal = parseFloat(newLoan.period || 1); 

        if (!newLoan.customerName || !principalVal) {
          triggerToast("Enter Customer Name and Principal amount", "warning");
          return;
        }

        const calculatedInterest = parseFloat(((principalVal * rateVal * periodVal) / 1200).toFixed(2));
        const totalPayable = principalVal + calculatedInterest;

        let updatedPassbooks = [...(passbooks || [])];
        if (newLoan.payMode === "Passbook") {
          if (!newLoan.passbookUid) {
            triggerToast("Enter Passbook UID to complete Loan integration", "error");
            return;
          }
          const pBook = updatedPassbooks.find(p => p.uid === newLoan.passbookUid);
          if (!pBook) {
            triggerToast("Selected loan passbook is invalid", "error");
            return;
          }
          pBook.balance = parseFloat((pBook.balance + principalVal).toFixed(2));
          pBook.statement = [
            ...(pBook.statement || []),
            { date: new Date().toLocaleString("en-IN"), type: "LOAN CREDIT", amount: principalVal, balance: pBook.balance }
          ];
        }

        const loanRecord = {
          id: "LOAN-" + Date.now().toString().slice(-6),
          date: new Date().toLocaleDateString("en-IN"),
          customerName: newLoan.customerName,
          phone: newLoan.phone || "N/A",
          principal: principalVal,
          rate: rateVal,
          period: periodVal,
          calculatedInterest,
          totalPayable,
          remainingAmount: totalPayable,
          paymentMode: newLoan.payMode,
          passbookUid: newLoan.passbookUid || "N/A",
          status: "Active"
        };

        const updatedLoans = [loanRecord, ...(loans || [])];
        setLoans(updatedLoans);
        setPassbooks(updatedPassbooks);

        await syncChanges(null, null, null, null, updatedPassbooks, updatedLoans);

        setNewLoan({ customerName: "", phone: "", principal: "", rate: "", period: "", payMode: "Cash", passbookUid: "" });
        triggerToast("Loan account active and funds recorded!", "success");
      };

      const handleLoanRepayment = async (e) => {
        e.preventDefault();
        const repayAmountVal = parseFloat(loanRepayAmount);
        if (!loanRepayId || !repayAmountVal) {
          triggerToast("Select Loan ID and Enter repay amount", "warning");
          return;
        }

        let updatedPassbooks = [...(passbooks || [])];
        const updatedLoans = (loans || []).map(l => {
          if (l.id === loanRepayId) {
            const newRemaining = parseFloat(Math.max(0, l.remainingAmount - repayAmountVal).toFixed(2));
            
            if (loanRepayMode === "Passbook" && l.passbookUid !== "N/A") {
              const pBook = updatedPassbooks.find(p => p.uid === l.passbookUid);
              if (pBook) {
                pBook.balance = parseFloat((pBook.balance - repayAmountVal).toFixed(2));
                pBook.statement = [
                  ...(pBook.statement || []),
                  { date: new Date().toLocaleString("en-IN"), type: "LOAN DEBIT (REPAY)", amount: repayAmountVal, balance: pBook.balance }
                ];
              }
            }

            return {
              ...l,
              remainingAmount: newRemaining,
              status: newRemaining === 0 ? "Repaid" : "Active"
            };
          }
          return l;
        });

        setLoans(updatedLoans);
        setPassbooks(updatedPassbooks);
        await syncChanges(null, null, null, null, updatedPassbooks, updatedLoans);

        setLoanRepayAmount("");
        triggerToast("Loan payment recorded on ledger", "success");
      };

      const handleAddCategory = async (e) => {
        e.preventDefault();
        if (!newCategoryInput.trim()) return;
        const updatedCategories = [...shopConfig.customCategories, newCategoryInput.trim()];
        const updatedConfig = { ...shopConfig, customCategories: updatedCategories };
        setShopConfig(updatedConfig);
        setNewCategoryInput("");
        await syncChanges(null, null, updatedConfig, null, null, null);
        triggerToast("Category added successfully", "success");
      };

      const handleDeleteCategory = async (catName) => {
        const proceed = await triggerCustomConfirm("Delete Category?", `Remove "${catName}" category?`);
        if (proceed) {
          const updatedCategories = shopConfig.customCategories.filter(c => c !== catName);
          const updatedConfig = { ...shopConfig, customCategories: updatedCategories };
          setShopConfig(updatedConfig);
          await syncChanges(null, null, updatedConfig, null, null, null);
          triggerToast("Category deleted", "warning");
        }
      };

      const filteredProducts = useMemo(() => {
        return (products || []).filter(p => {
          const searchLower = posSearch.toLowerCase();
          const matchesSearch = p.name.toLowerCase().includes(searchLower) || p.category.toLowerCase().includes(searchLower);
          const matchesCategory = posCategory === "All" || p.category === posCategory;
          return matchesSearch && matchesCategory;
        });
      }, [products, posSearch, posCategory]);

      const dashboardStats = useMemo(() => {
        const netSales = (sales || []).filter(s => s.status === "Success").reduce((acc, s) => acc + (s.totalAmount || 0), 0);
        const activeLoansVal = (loans || []).filter(l => l.status === "Active").reduce((acc, l) => acc + (l.remainingAmount || 0), 0);
        const totalRefillsValue = (purchases || []).reduce((acc, p) => acc + (p.totalCost || 0), 0);
        return { netSales, activeLoansVal, totalRefillsValue };
      }, [sales, loans, purchases]);

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* Main Top Header Block */}
          <header className="glass-panel sticky top-0 z-40 px-6 py-4 flex items-center justify-between border-b border-white/10">
            <div className="flex items-center gap-3">
              {shopConfig.logo ? (
                <img src={shopConfig.logo} alt="Logo" className="w-12 h-12 rounded-full object-cover border border-orange-500 shadow-md shadow-orange-500/20" />
              ) : (
                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-orange-500 to-amber-600 flex items-center justify-center font-extrabold text-xl text-white shadow-lg">
                  {(shopConfig && shopConfig.name) ? shopConfig.name.charAt(0).toUpperCase() : "O"}
                </div>
              )}
              <div>
                <h1 className="text-xl font-extrabold bg-gradient-to-r from-orange-400 to-amber-200 bg-clip-text text-transparent flex items-center gap-2">
                  {shopConfig.name || "OrangeGlass POS"}
                  <span className="text-[10px] px-2 py-0.5 rounded-full bg-orange-500/20 text-orange-300 border border-orange-500/30 font-medium">V2 Local Sync</span>
                </h1>
                <p className="text-xs text-gray-400 font-light tracking-wider">{shopConfig.tagline || "Quality Groceries & POS Solutions"}</p>
              </div>
            </div>

            <div className="flex items-center gap-3">
              {isSynced ? (
                <span className="hidden md:inline-flex items-center gap-1.5 text-xs text-green-400 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
                  <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                  Local Files Connected
                </span>
              ) : (
                <span className="hidden md:inline-flex items-center gap-1.5 text-xs text-amber-400 bg-amber-500/10 px-3 py-1.5 rounded-full border border-amber-500/20">
                  <span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                  Sandbox Cache Mode
                </span>
              )}
              
              <button 
                onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
                className="p-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10"
              >
                <Icon name="menu" className="w-5 h-5 text-gray-300" />
              </button>
            </div>
          </header>

          <div className="flex-1 flex flex-col lg:flex-row">
            
            {/* Sidebar Navigation Panel Layout */}
            <aside className={`glass-panel border-r border-white/10 p-4 flex flex-col gap-2 shrink-0 transition-all duration-300 ${sidebarCollapsed ? 'lg:w-20' : 'lg:w-64'}`}>
              <p className={`text-xs font-semibold text-orange-400 tracking-wider uppercase px-3 py-2 ${sidebarCollapsed ? 'hidden lg:block lg:text-center' : ''}`}>
                {sidebarCollapsed ? "..." : "POS Operations"}
              </p>

              <button 
                onClick={() => isSynced ? setCurrentTab("pos") : triggerToast("Grant folder access to unlock POS panel!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "pos" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="shoppingCart" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>POS Register</span>
              </button>

              <button 
                onClick={() => isSynced ? setCurrentTab("dashboard") : triggerToast("Grant folder access to view sales trends!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "dashboard" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="barChart" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>Dashboard</span>
              </button>

              <button 
                onClick={() => isSynced ? setCurrentTab("inventory") : triggerToast("Grant folder access to inspect stock!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "inventory" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="package" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>Inventory Manager</span>
              </button>

              <button 
                onClick={() => isSynced ? setCurrentTab("purchases") : triggerToast("Grant folder access to log purchases!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "purchases" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="truck" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>Stock Refills</span>
              </button>

              <button 
                onClick={() => isSynced ? setCurrentTab("services") : triggerToast("Grant folder access to open Bookkeeping Services!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "services" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="wallet" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>Services Book</span>
              </button>

              <button 
                onClick={() => isSynced ? setCurrentTab("sales") : triggerToast("Grant folder access to view invoices!", "warning")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  !isSynced ? 'opacity-40 cursor-not-allowed' :
                  currentTab === "sales" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="fileText" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>Sales Log History</span>
              </button>

              <p className={`text-xs font-semibold text-orange-400 tracking-wider uppercase px-3 py-2 mt-4 ${sidebarCollapsed ? 'hidden lg:block lg:text-center' : ''}`}>
                {sidebarCollapsed ? "..." : "Administrative"}
              </p>

              <button 
                onClick={() => setCurrentTab("settings")}
                className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all ${
                  currentTab === "settings" ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30' : 'hover:bg-white/5 text-gray-300'
                }`}
              >
                <Icon name="settings" />
                <span className={sidebarCollapsed ? 'lg:hidden' : ''}>System Settings</span>
              </button>

              {isSynced && !sidebarCollapsed && (
                <div className="mt-auto p-3 rounded-2xl bg-orange-500/10 border border-orange-500/20 text-center flex flex-col gap-2">
                  <p className="text-[10px] text-gray-400 font-mono truncate">{dirHandle ? dirHandle.name : "N/A"}</p>
                  <button 
                    onClick={disconnectFolder}
                    className="text-xs bg-red-500/20 hover:bg-red-500 text-red-200 py-1.5 px-3 rounded-lg border border-red-500/30 transition-all font-semibold"
                  >
                    Unmount Database
                  </button>
                </div>
              )}
            </aside>

            {/* Main view panel portal */}
            <main className="flex-1 p-6 overflow-y-auto no-scrollbar relative min-h-[500px]">

              {/* STRICT PERMISSIONS OVERLAY PANEL (STOPS ACTIONS UNTIL UNLOCKED) */}
              {!isSynced && !syncLoading && (
                <div className="absolute inset-0 z-30 flex items-center justify-center bg-[#070505]/90 backdrop-blur-md p-6">
                  <div className="max-w-md w-full glass-panel-orange p-8 rounded-3xl border border-orange-500/30 shadow-2xl text-center flex flex-col items-center gap-6 animate-scale-up">
                    <div className="w-20 h-20 rounded-full bg-orange-500/15 flex items-center justify-center text-orange-400 border border-orange-500/30">
                      <Icon name="lock" className="w-10 h-10 animate-pulse" />
                    </div>
                    <div>
                      <h2 className="text-2xl font-black text-white mb-2">Sync Local Directory</h2>
                      <p className="text-sm text-gray-300 leading-relaxed">
                        To load your products and process sales securely, please sync your local folder on your computer. Your transactions stay private.
                      </p>
                    </div>

                    <button 
                      onClick={handleSelectFolder}
                      className="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-extrabold py-4 px-6 rounded-2xl shadow-xl transition-all duration-300 transform hover:-translate-y-0.5 flex items-center justify-center gap-3 border border-orange-400/20"
                    >
                      <Icon name="folder" />
                      <span>Select Local Database Folder</span>
                    </button>

                    <p className="text-xs text-gray-500 font-mono italic">
                      Reads/writes: shop_products.json, shop_sales.json, shop_config.json, shop_purchases.json, shop_passbooks.json
                    </p>
                  </div>
                </div>
              )}

              {/* ACTIVE SYNCHRONIZATION LOADING SPLASH */}
              {syncLoading && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-[#070505] backdrop-blur-xl">
                  <div className="max-w-md w-full text-center flex flex-col items-center gap-6">
                    <div className="relative w-28 h-28 flex items-center justify-center">
                      <div className="absolute inset-0 rounded-full border-4 border-dashed border-orange-500 animate-spin"></div>
                      <div className="w-20 h-20 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400">
                        <Icon name="refresh" className="w-10 h-10" />
                      </div>
                    </div>
                    <div>
                      <h3 className="text-xl font-extrabold text-white mb-1">Synchronizing Storage Drive</h3>
                      <p className="text-xs text-orange-400 font-mono tracking-wider animate-pulse">{syncStepText}</p>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB CONTAINER: DASHBOARD VIEW */}
              {currentTab === "dashboard" && isSynced && (
                <div className="space-y-6">
                  <h2 className="text-2xl font-black text-white flex items-center gap-2">
                    <Icon name="barChart" className="text-orange-500 w-8 h-8" />
                    Overview Analytics & Dashboard
                  </h2>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="glass-panel p-6 rounded-2xl flex items-center gap-5">
                      <div className="p-4 bg-orange-500/10 rounded-xl text-orange-400 border border-orange-500/20">
                        <span className="text-2xl font-black">₹</span>
                      </div>
                      <div>
                        <p className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Net Completed Sales</p>
                        <h4 className="text-2xl font-extrabold text-white mt-1">₹{dashboardStats.netSales.toLocaleString("en-IN")}</h4>
                      </div>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl flex items-center gap-5">
                      <div className="p-4 bg-orange-500/10 rounded-xl text-orange-400 border border-orange-500/20">
                        <Icon name="star" />
                      </div>
                      <div>
                        <p className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Active Loan Receivables</p>
                        <h4 className="text-2xl font-extrabold text-white mt-1">₹{dashboardStats.activeLoansVal.toLocaleString("en-IN")}</h4>
                      </div>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl flex items-center gap-5">
                      <div className="p-4 bg-orange-500/10 rounded-xl text-orange-400 border border-orange-500/20">
                        <Icon name="truck" />
                      </div>
                      <div>
                        <p className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Stock Purchases Outflow</p>
                        <h4 className="text-2xl font-extrabold text-white mt-1">₹{dashboardStats.totalRefillsValue.toLocaleString("en-IN")}</h4>
                      </div>
                    </div>
                  </div>

                  {/* Low Stock Indicators */}
                  <div className="glass-panel p-6 rounded-3xl">
                    <h3 className="text-lg font-bold text-white flex items-center gap-2 mb-4">
                      <Icon name="info" className="text-orange-500" />
                      Critical Stock Alerts
                    </h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                      {(products || []).filter(p => p.stock <= p.minStock).length === 0 ? (
                        <p className="text-sm text-gray-400 col-span-3 text-center py-6">All products are stocked sufficiently.</p>
                      ) : (
                        (products || []).filter(p => p.stock <= p.minStock).map(p => (
                          <div key={p.id} className="p-4 bg-red-500/5 border border-red-500/20 rounded-xl flex justify-between items-center">
                            <div>
                              <p className="text-xs text-gray-400 uppercase font-bold">{p.category}</p>
                              <h4 className="text-sm font-bold text-white mt-0.5">{p.name}</h4>
                            </div>
                            <span className="text-xs text-red-400 font-extrabold bg-red-500/10 px-2 py-1 rounded">
                              {p.stock} {p.baseUnit} left
                            </span>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* TAB CONTAINER: POINT OF SALE TERMINAL REGISTER */}
              {currentTab === "pos" && isSynced && (
                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                  
                  {/* Left item grid column */}
                  <div className="xl:col-span-7 flex flex-col gap-6">
                    
                    {/* Header Filters & Weighing Terminal Inputs */}
                    <div className="glass-panel p-4 rounded-3xl flex flex-col gap-4">
                      
                      {/* Search Bar */}
                      <div className="flex gap-2">
                        <div className="relative flex-1">
                          <Icon name="search" className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" />
                          <input 
                            type="text" 
                            placeholder="Filter products, scan barcodes..." 
                            value={posSearch}
                            onChange={(e) => setPosSearch(e.target.value)}
                            className="w-full glass-input pl-10 pr-4 py-2.5 rounded-xl text-sm"
                          />
                        </div>
                        <div className="flex gap-1 overflow-x-auto no-scrollbar max-w-[200px]">
                          {["All", ...shopConfig.customCategories].map(cat => (
                            <button
                              key={cat}
                              onClick={() => setPosCategory(cat)}
                              className={`px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all ${
                                posCategory === cat ? 'bg-orange-500 text-white shadow-md' : 'bg-white/5 text-gray-300'
                              }`}
                            >
                              {cat}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Weight / Fractional Unit Terminal Panel */}
                      <div className="p-3 bg-white/5 rounded-2xl border border-white/5 grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">1. Custom Measure/Weight</label>
                          <input 
                            type="number" 
                            value={weightEntry}
                            onChange={(e) => setWeightEntry(e.target.value)}
                            placeholder="e.g. 40, 1.5, 500"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono font-bold"
                          />
                        </div>
                        
                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">2. Custom Unit Type</label>
                          <select 
                            value={weightUnit} 
                            onChange={(e) => setWeightUnit(e.target.value)}
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-bold"
                          >
                            <option value="kg">kg (Kilogram)</option>
                            <option value="gram">gram (Grams)</option>
                            <option value="Liter">Liter</option>
                            <option value="ml">ml (Milliliters)</option>
                            <option value="Piece">Piece / Unit</option>
                            <option value="Dozen">Dozen</option>
                          </select>
                        </div>

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">3. Manual Cost Override (Optional)</label>
                          <input 
                            type="number" 
                            value={manualTotalOverride}
                            onChange={(e) => setManualTotalOverride(e.target.value)}
                            placeholder="Flat price (e.g. 25)"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono"
                          />
                        </div>

                        <div className="flex items-end">
                          <div className="w-full p-2 bg-orange-500/10 border border-orange-500/20 text-orange-300 text-[10px] font-bold rounded-xl text-center">
                            Weight / Overrides applied at click!
                          </div>
                        </div>
                      </div>

                    </div>

                    {/* Shop Inventory Grid Cards */}
                    {filteredProducts.length === 0 ? (
                      <div className="glass-panel p-12 rounded-3xl text-center">
                        <p className="text-sm text-gray-400">No matching products found inside database files.</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        {filteredProducts.map(prod => (
                          <div 
                            key={prod.id}
                            onClick={() => prod.stock > 0 ? addItemToCart(prod) : triggerToast("Out of stock!", "error")}
                            className={`glass-panel p-4 rounded-3xl border border-white/5 hover:border-orange-500/30 transition-all cursor-pointer transform hover:-translate-y-1 relative overflow-hidden flex flex-col justify-between ${prod.stock === 0 ? 'opacity-40' : ''}`}
                          >
                            <div>
                              <div className="flex justify-between items-start">
                                <span className="text-[10px] uppercase font-extrabold text-orange-400 bg-orange-500/10 px-2 py-0.5 rounded border border-orange-500/10">{prod.category}</span>
                                <span className="text-[10px] text-gray-400">Stock: {prod.stock} {prod.baseUnit}</span>
                              </div>
                              {prod.imageUrl && (
                                <img src={prod.imageUrl} alt={prod.name} className="w-full h-20 object-cover rounded-xl mt-2 border border-white/10" />
                              )}
                              <h4 className="text-sm font-bold text-white mt-2">{prod.name}</h4>
                            </div>
                            <div className="mt-4 pt-2 border-t border-white/5 flex justify-between items-end">
                              <div>
                                <p className="text-[10px] text-gray-400">Rate</p>
                                <p className="text-sm font-black text-white">₹{prod.basePrice}/{prod.baseUnit}</p>
                              </div>
                              {prod.hasSubUnit && (
                                <div className="text-right">
                                  <p className="text-[9px] text-orange-400 font-bold">Subunit Active</p>
                                  <p className="text-[9px] text-gray-400">₹{(prod.basePrice / prod.subUnitFactor).toFixed(3)}/{prod.subUnitName}</p>
                                </div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Dynamic Register Checkout column */}
                  <div className="xl:col-span-5 glass-panel p-5 rounded-3xl border border-white/10 flex flex-col justify-between min-h-[500px]">
                    <div>
                      <div className="flex justify-between items-center pb-3 border-b border-white/5">
                        <h3 className="font-extrabold text-white flex items-center gap-2">
                          <Icon name="shoppingCart" className="text-orange-500" />
                          Checkout Register
                        </h3>
                        <button onClick={() => setCart([])} className="text-xs text-red-400 hover:text-red-300">Clear</button>
                      </div>

                      {/* Customer Credentials Input */}
                      <div className="grid grid-cols-2 gap-2 py-3 border-b border-white/5">
                        <input 
                          type="text" 
                          placeholder="Cust. Name" 
                          value={customerName}
                          onChange={(e) => setCustomerName(e.target.value)}
                          className="glass-input px-3 py-1.5 rounded-xl text-xs font-semibold"
                        />
                        <input 
                          type="text" 
                          placeholder="Cust. Phone" 
                          value={customerPhone}
                          onChange={(e) => setCustomerPhone(e.target.value)}
                          className="glass-input px-3 py-1.5 rounded-xl text-xs font-semibold"
                        />
                      </div>

                      {/* Item lists in cart */}
                      <div className="py-3 space-y-3 max-h-[250px] overflow-y-auto no-scrollbar pr-1">
                        {cart.length === 0 ? (
                          <p className="text-xs text-gray-500 text-center py-6">Register basket is empty.</p>
                        ) : (
                          cart.map((item, index) => (
                            <div key={index} className="flex items-center justify-between p-2.5 bg-white/5 rounded-2xl border border-white/5 text-xs">
                              <div>
                                <h5 className="font-bold text-white">{item.product.name}</h5>
                                <p className="text-[10px] text-orange-400 mt-0.5">{item.quantity} {item.selectedUnit} @ {item.rateDetails}</p>
                              </div>
                              <div className="flex items-center gap-3">
                                <span className="font-mono font-bold text-white">₹{item.totalCost.toFixed(2)}</span>
                                <button onClick={() => removeFromCart(index)} className="text-red-400 hover:text-red-300">
                                  <Icon name="trash" className="w-4 h-4" />
                                </button>
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                    <div className="border-t border-white/5 pt-4 space-y-4">
                      
                      {/* Checkout Options Panel */}
                      <div className="bg-white/5 p-3 rounded-2xl border border-white/5 space-y-3">
                        <div class="flex items-center justify-between text-xs">
                          <label className="text-gray-400 font-semibold">Taxes Toggle</label>
                          <button 
                            onClick={() => setManualTaxToggle(!manualTaxToggle)}
                            className={`px-3 py-1 rounded-lg text-[10px] font-bold ${manualTaxToggle ? 'bg-orange-500 text-white' : 'bg-white/10 text-gray-300'}`}
                          >
                            {manualTaxToggle ? "GST (5%) Active" : "Tax Free Bill"}
                          </button>
                        </div>

                        {/* Payment Modes selection */}
                        <div className="space-y-1.5">
                          <label className="text-[10px] text-gray-400 font-bold uppercase block">Payment Method Selector</label>
                          <div className="grid grid-cols-3 gap-2">
                            {["Cash", "UPI", "Passbook"].map(mode => (
                              <button 
                                key={mode}
                                type="button"
                                onClick={() => setPaymentMode(mode)}
                                className={`py-1.5 rounded-lg text-xs font-bold transition-all ${paymentMode === mode ? 'bg-orange-500 text-white shadow-md' : 'bg-white/5 text-gray-300'}`}
                              >
                                {mode}
                              </button>
                            ))}
                          </div>
                        </div>

                        {/* If UPI option is chosen, highlight UPI credentials */}
                        {paymentMode === "UPI" && (
                          <div className="p-2.5 bg-orange-500/10 border border-orange-500/20 rounded-xl text-xs space-y-1">
                            <p className="font-bold text-orange-300">Active merchant UPI ID:</p>
                            <p className="font-mono text-white text-[10px]">{shopConfig.activeUpiId || "Configure inside Settings!"}</p>
                          </div>
                        )}

                        {/* If Passbook is chosen, input Passbook UID */}
                        {paymentMode === "Passbook" && (
                          <div className="space-y-1.5 animate-scale-up">
                            <label className="text-[10px] text-gray-300 font-bold block">Enter Customer Passbook UID *</label>
                            <input 
                              type="text" 
                              placeholder="e.g. PB-540201" 
                              value={passbookCheckoutUid}
                              onChange={(e) => setPassbookCheckoutUid(e.target.value)}
                              className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono font-bold"
                            />
                          </div>
                        )}
                      </div>

                      {/* Calculations Panel */}
                      <div className="space-y-2 text-xs">
                        <div className="flex justify-between text-gray-400">
                          <span>Subtotal Cost</span>
                          <span className="text-white font-mono">₹{cart.reduce((sum, item) => sum + item.totalCost, 0).toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between text-gray-400">
                          <span>SGST + CGST (5%)</span>
                          <span className="text-white font-mono">₹{(manualTaxToggle ? cart.reduce((sum, item) => sum + item.totalCost, 0) * 0.05 : 0).toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between items-center text-sm pt-2 border-t border-dashed border-white/10">
                          <span className="font-bold text-white">Grand Net Amount</span>
                          <span className="text-xl font-black text-orange-400">
                            ₹{(cart.reduce((sum, item) => sum + item.totalCost, 0) * (manualTaxToggle ? 1.05 : 1)).toFixed(2)}
                          </span>
                        </div>
                      </div>

                      {/* Checkout Buttons */}
                      <div className="grid grid-cols-2 gap-2">
                        <button 
                          onClick={() => completeCheckout("Cancelled")}
                          disabled={cart.length === 0}
                          className="bg-red-500/10 border border-red-500/20 hover:bg-red-500 hover:text-white text-red-300 text-xs py-3 rounded-2xl font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                        >
                          Reject / Cancel Checkout
                        </button>
                        <button 
                          onClick={() => completeCheckout("Success")}
                          disabled={cart.length === 0}
                          className="bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white text-xs py-3 rounded-2xl font-black shadow-lg shadow-orange-500/10 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                        >
                          Approve / Payment Done
                        </button>
                      </div>

                    </div>
                  </div>

                </div>
              )}

              {/* TAB CONTAINER: INVENTORY MANAGER */}
              {currentTab === "inventory" && isSynced && (
                <div className="space-y-6">
                  <div className="flex justify-between items-center">
                    <h2 className="text-2xl font-black text-white flex items-center gap-2">
                      <Icon name="package" className="text-orange-500 w-8 h-8" />
                      Shop Products Register
                    </h2>
                    <button 
                      onClick={() => {
                        setEditingProduct({
                          id: "", name: "", category: shopConfig.customCategories[0] || "Others", baseUnit: "kg", basePrice: 40, hasSubUnit: true, subUnitName: "gram", subUnitFactor: 1000, stock: 100, minStock: 10, imageUrl: ""
                        });
                        setIsProductModalOpen(true);
                      }}
                      className="bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs py-2 px-4 rounded-xl flex items-center gap-1.5 shadow-md shadow-orange-500/15"
                    >
                      <Icon name="plus" />
                      Add Product
                    </button>
                  </div>

                  <div className="glass-panel rounded-3xl overflow-hidden border border-white/10">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs text-gray-300">
                        <thead className="bg-white/5 border-b border-white/5 text-orange-400 uppercase font-bold tracking-wider">
                          <tr>
                            <th className="p-4">Item Name</th>
                            <th className="p-4">Category</th>
                            <th className="p-4">Unit Pricing</th>
                            <th className="p-4">Subunit Conversion Factor</th>
                            <th className="p-4">Stock Ledger</th>
                            <th className="p-4 text-center">Actions</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {products.map(p => (
                            <tr key={p.id} className="hover:bg-white/5 transition-all">
                              <td className="p-4 flex items-center gap-3">
                                {p.imageUrl && <img src={p.imageUrl} alt={p.name} className="w-8 h-8 rounded-lg object-cover" />}
                                <span className="font-extrabold text-white">{p.name}</span>
                              </td>
                              <td className="p-4">{p.category}</td>
                              <td className="p-4 font-bold">₹{p.basePrice}/{p.baseUnit}</td>
                              <td className="p-4 text-orange-300 font-semibold">
                                {p.hasSubUnit ? `1 ${p.baseUnit} = ${p.subUnitFactor} ${p.subUnitName}` : "N/A"}
                              </td>
                              <td className="p-4 font-bold">
                                <span className={p.stock <= p.minStock ? 'text-red-400 animate-pulse' : 'text-green-400'}>
                                  {p.stock} {p.baseUnit}
                                </span>
                              </td>
                              <td className="p-4 text-center">
                                <div className="flex items-center justify-center gap-2">
                                  <button onClick={() => { setEditingProduct({ ...p }); setIsProductModalOpen(true); }} className="text-orange-400 hover:text-orange-300">Edit</button>
                                  <button onClick={() => deleteProductDetails(p.id)} className="text-red-400 hover:text-red-300">Delete</button>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB CONTAINER: PURCHASES & REFILLS */}
              {currentTab === "purchases" && isSynced && (
                <div className="space-y-6">
                  <h2 className="text-2xl font-black text-white flex items-center gap-2">
                    <Icon name="truck" className="text-orange-500 w-8 h-8" />
                    Inventory Stock Refills Logs
                  </h2>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                    
                    {/* Add Refill purchase Column */}
                    <form onSubmit={executeInventoryRefill} className="lg:col-span-4 glass-panel p-5 rounded-3xl border border-orange-500/10 space-y-4">
                      <h3 className="font-bold text-white text-sm border-b border-white/5 pb-2">Log New Stock Refill</h3>
                      
                      <div>
                        <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Wholesale Supplier/Party Name</label>
                        <input 
                          type="text" 
                          required
                          value={newPurchase.partyName}
                          onChange={(e) => setNewPurchase({ ...newPurchase, partyName: e.target.value })}
                          placeholder="e.g. Abinash Wholesale Ltd."
                          className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                        />
                      </div>

                      <div>
                        <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Select Store Item *</label>
                        <select 
                          required
                          value={newPurchase.itemId}
                          onChange={(e) => setNewPurchase({ ...newPurchase, itemId: e.target.value })}
