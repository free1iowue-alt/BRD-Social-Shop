                          className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                        >
                          <option value="">-- Choose Item --</option>
                          {products.map(p => (
                            <option key={p.id} value={p.id}>{p.name} ({p.stock} {p.baseUnit} left)</option>
                          ))}
                        </select>
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Refill Qty *</label>
                          <input 
                            type="number" 
                            step="any"
                            required
                            value={newPurchase.qty}
                            onChange={(e) => setNewPurchase({ ...newPurchase, qty: e.target.value })}
                            placeholder="e.g. 100"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono"
                          />
                        </div>
                        
                        {/* MANUAL REFILL UNIT TEXTBOX ENTRY */}
                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Refill Unit * (Manual)</label>
                          <input 
                            type="text" 
                            required
                            value={newPurchase.unitName}
                            onChange={(e) => setNewPurchase({ ...newPurchase, unitName: e.target.value })}
                            placeholder="e.g. bags, crate, kg"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-semibold"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Wholesale Purchase Price (per unit) *</label>
                        <input 
                          type="number" 
                          step="any"
                          required
                          value={newPurchase.costPrice}
                          onChange={(e) => setNewPurchase({ ...newPurchase, costPrice: e.target.value })}
                          placeholder="Wholesale rate (e.g. 35)"
                          className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono"
                        />
                      </div>

                      <div>
                        <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Supplier Payment Status</label>
                        <select 
                          value={newPurchase.paymentStatus}
                          onChange={(e) => setNewPurchase({ ...newPurchase, paymentStatus: e.target.value })}
                          className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                        >
                          <option value="Fully Paid">Fully Paid</option>
                          <option value="Due">Due (Add to Lenders Ledger)</option>
                          <option value="Partially Paid">Partially Paid</option>
                        </select>
                      </div>

                      {newPurchase.paymentStatus === "Partially Paid" && (
                        <div className="animate-scale-up">
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Downpayment Paid (₹) *</label>
                          <input 
                            type="number" 
                            required
                            value={newPurchase.paidAmount}
                            onChange={(e) => setNewPurchase({ ...newPurchase, paidAmount: e.target.value })}
                            placeholder="e.g. 500"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono"
                          />
                        </div>
                      )}

                      <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs py-3 rounded-2xl shadow-md">

                      </button>
                    </form>

                    {/* Historical Purchase Logs ledger Column */}

                        <div className="overflow-x-auto">
                          <table className="w-full text-left text-xs text-gray-300">
                            <thead className="text-orange-400 font-bold uppercase">
                              <tr>
                                <th className="pb-2">ID</th>
                                <th className="pb-2">Date</th>
                                <th className="pb-2">Supplier Party</th>
                                <th className="pb-2">Item Refilled</th>
                                <th className="pb-2">Total Amount</th>
                                <th className="pb-2">Payment Status</th>
                              </tr>
                            </thead>

                              {(purchases || []).length === 0 ? (
                                <tr><td colSpan="6" class="text-center py-6 text-gray-500">No stock refills recorded.</td></tr>

                                  <tr key={pur.id} className="hover:bg-white/5">

                                    <td className="py-2.5 text-gray-400">{pur.date}</td>
                                    <td className="py-2.5 text-white font-bold">{pur.partyName}</td>
                                    <td className="py-2.5">{pur.itemName} ({pur.quantity} {pur.unitName})</td>
                                    <td className="py-2.5 font-bold">₹{(pur.totalCost || 0).toFixed(2)}</td>
                                    <td className="py-2.5 font-bold">
                                      <span className={`px-2 py-0.5 rounded text-[10px] ${pur.paymentStatus === 'Fully Paid' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                        {pur.paymentStatus}
                                      </span>
                                    </td>
                                  </tr>
                                ))
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              )}

              {currentTab === "services" && isSynced && (

                  {/* Services Mini Sub Header */}

                    <div className="flex gap-1.5 bg-white/5 p-1 rounded-xl border border-white/10">

                          key={subTab}
                          onClick={() => setServicesTab(subTab)}
                          className={`px-3 py-1.5 rounded-lg text-xs font-bold uppercase transition-all ${
                            servicesTab === subTab ? 'bg-orange-500 text-white shadow-md' : 'text-gray-400 hover:text-white'

                          {subTab}
                        </button>

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Customer Full Name *</label>
                          <input 
                            type="text" required
                            value={newPassbook.name}
                            onChange={(e) => setNewPassbook({ ...newPassbook, name: e.target.value })}
                            placeholder="e.g. Abinash Rizal"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                          />
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Phone Number</label>
                            <input 
                              type="text"
                              value={newPassbook.phone}
                              onChange={(e) => setNewPassbook({ ...newPassbook, phone: e.target.value })}
                              placeholder="e.g. 9876543210"
                              className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Opening Bal (₹)</label>
                            <input 
                              type="number"
                              value={newPassbook.openingBal}
                              onChange={(e) => setNewPassbook({ ...newPassbook, openingBal: e.target.value })}
                              placeholder="e.g. 1500"
                              className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono"
                            />
                          </div>
                        </div>

                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Passbook Security PIN / Password *</label>

                            type="password" required

                            onChange={(e) => setNewPassbook({ ...newPassbook, password: e.target.value })}

                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Expiry Date / Time</label>

                            type="date"
                            value={newPassbook.expiryDate}
                            onChange={(e) => setNewPassbook({ ...newPassbook, expiryDate: e.target.value })}
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                          />
                        </div>

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Customer Home Address</label>
                          <input 
                            type="text"
                            value={newPassbook.address}
                            onChange={(e) => setNewPassbook({ ...newPassbook, address: e.target.value })}
                            placeholder="Residential Details"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                          />
                        </div>

                        <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs py-3 rounded-2xl shadow-md">
                          Generate Security Passbook Account
                        </button>
                      </form>

                          {/* Search Passbook UID */}
                          <div className="flex gap-2">
                            <input 
                              type="text" 
                              placeholder="Enter Passbook UID (e.g. PB-123456)" 
                              value={selectedPassbookUid}
                              onChange={(e) => setSelectedPassbookUid(e.target.value)}
                              className="flex-1 glass-input px-4 py-2 rounded-xl text-xs font-mono font-bold"
                            />
                            <button 
                              onClick={handleFetchPassbook}
                              className="bg-orange-500 hover:bg-orange-600 text-white px-4 rounded-xl text-xs font-bold"
                            >
                              Fetch Passbook Details
                            </button>
                          </div>

                          {fetchedPassbook ? (
                            <div className="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-4 animate-scale-up">

                                <div>
                                  <p className="text-gray-400">Cardholder Name</p>
                                  <p className="font-extrabold text-white text-sm">{fetchedPassbook.name}</p>
                                </div>
                                <div>
                                  <p className="text-gray-400">Passbook UID</p>
                                  <p className="font-mono font-bold text-orange-400 text-sm">{fetchedPassbook.uid}</p>
                                </div>
                                <div>
                                  <p className="text-gray-400">Available Balance</p>
                                  <p className="font-extrabold text-white text-sm text-green-400 font-mono">₹{(fetchedPassbook.balance || 0).toFixed(2)}</p>
                                </div>
                                <div>
                                  <p className="text-gray-400">Account Expiry</p>
                                  <p className="text-white font-semibold">{fetchedPassbook.expiryDate || "Active"}</p>
                                </div>
                              </div>

                              {/* Transaction Action form */}
                              <div className="border-t border-white/5 pt-4 grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                                <div>
                                  <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Transaction Type</label>
                                  <select 
                                    value={passbookActionType}
                                    onChange={(e) => setPassbookActionType(e.target.value)}
                                    className="w-full glass-input p-2 rounded-lg text-xs"

                                    <option value="deposit">Deposit (Credit Account)</option>
                                    <option value="withdraw">Withdrawal (Debit Account)</option>
                                  </select>

                                  <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Enter Value (₹)</label>
                                  <input 
                                    type="number"
                                    value={passbookActionAmount}
                                    onChange={(e) => setPassbookActionAmount(e.target.value)}
                                    placeholder="Amount e.g. 500"
                                    className="w-full glass-input p-2 rounded-lg text-xs font-mono"
                                  />
                                </div>

                                  <div>
                                    <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Security PIN/Password</label>

                                      type="password"
                                      value={passbookActionPassword}
                                      onChange={(e) => setPassbookActionPassword(e.target.value)}
                                      placeholder="Passbook Code"
                                      className="w-full glass-input p-2 rounded-lg text-xs"
                                    />
                                  </div>
                                ) : (
                                  <div className="hidden md:block"></div>
                                )}

                                <button 
                                  onClick={executePassbookAction}
                                  className="w-full bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white font-bold text-xs py-2 rounded-xl h-10 shadow-md"
                                >
                                  Execute Ledger Adjustment
                                </button>
                              </div>

                              {/* Recovery triggers (Custom overlay) */}
                              <div className="text-right">
                                <button 
                                  type="button" 
                                  onClick={async () => {
                                    const codeInput = await triggerCustomPrompt("Password Recovery Verification", "Enter account custom Recovery Code or Answer to reset Passbook PIN:", "Secret Code");

                                      const newPass = await triggerCustomPrompt("PIN Recovery Successful", "Enter new Numeric Security Password PIN:", "New PIN Password");

                                        const updatedPb = (passbooks || []).map(p => p.uid === fetchedPassbook.uid ? { ...p, password: newPass } : p);
                                        setPassbooks(updatedPb);
                                        await syncChanges(null, null, null, null, updatedPb, null);
                                        setFetchedPassbook({ ...fetchedPassbook, password: newPass });
                                        triggerToast("Passbook credentials updated successfully", "success");
                                      }
                                    }
                                  }}
                                  className="text-[10px] text-orange-400 hover:underline"
                                >
                                  Reset Security Password Code?
                                </button>
                              </div>

                              {/* Statements history ledger */}
                              <div className="border-t border-white/5 pt-3 space-y-2">
                                <h4 className="text-[10px] text-orange-400 font-bold uppercase tracking-wider">Account Transaction Statements</h4>

                                      <span className={st.type.includes("DEPOSIT") || st.type.includes("Opening") || st.type.includes("CREDIT") ? "text-green-400" : "text-red-400"}>

                                      </span>
                                      <span className="text-gray-400">Balance: ₹{(st.balance || 0).toFixed(2)}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>

                            </div>
                          ) : (
                            <div className="p-6 text-center text-gray-500 border border-dashed border-white/10 rounded-2xl">
                              Audit session empty. Fetch passbook above to perform credits, debits or print statements.
                            </div>
                          )}

                        </div>
                      </div>

                    </div>

                      {/* Register New Loan Account */}

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Borrower Customer Name *</label>
                          <input 
                            type="text" required
                            value={newLoan.customerName}
                            onChange={(e) => setNewLoan({ ...newLoan, customerName: e.target.value })}
                            placeholder="e.g. Abinash Rizal"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                          />
                        </div>

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Phone Number</label>
                          <input 
                            type="text"
                            value={newLoan.phone}
                            onChange={(e) => setNewLoan({ ...newLoan, phone: e.target.value })}
                            placeholder="Contact details"
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs"
                          />
                        </div>

                        <div className="grid grid-cols-3 gap-2">
                          <div>
                            <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Principal (₹)</label>
                            <input 
                              type="number" required
                              value={newLoan.principal}
                              onChange={(e) => setNewLoan({ ...newLoan, principal: e.target.value })}
                              placeholder="e.g. 5000"
                              className="w-full glass-input px-2 py-1.5 rounded-xl text-xs font-mono"
                            />
                          </div>
                          <div>
                            <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Rate % (Yearly)</label>
                            <input 
                              type="number" step="any"
                              value={newLoan.rate}
                              onChange={(e) => setNewLoan({ ...newLoan, rate: e.target.value })}
                              placeholder="e.g. 12"
                              className="w-full glass-input px-2 py-1.5 rounded-xl text-xs font-mono"
                            />
                          </div>
                          <div>
                            <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Period (Months)</label>
                            <input 
                              type="number"
                              value={newLoan.period}
                              onChange={(e) => setNewLoan({ ...newLoan, period: e.target.value })}
                              placeholder="e.g. 6"
                              className="w-full glass-input px-2 py-1.5 rounded-xl text-xs font-mono"
                            />
                          </div>
                        </div>

                        <div>
                          <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Disbursement Fund Delivery Method</label>
                          <select 
                            value={newLoan.payMode}
                            onChange={(e) => setNewLoan({ ...newLoan, payMode: e.target.value })}
                            className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-bold"
                          >
                            <option value="Cash">Disburse Cash Handout</option>
                            <option value="UPI">Disburse via Merchant UPI</option>
                            <option value="Passbook">Disburse Direct to Customer Passbook Account</option>
                          </select>
                        </div>

                        {newLoan.payMode === "Passbook" && (
                          <div className="animate-scale-up">
                            <label className="text-[10px] text-gray-300 font-bold block mb-1">Borrower Passbook UID *</label>
                            <input 
                              type="text" required
                              value={newLoan.passbookUid}
                              onChange={(e) => setNewLoan({ ...newLoan, passbookUid: e.target.value })}
                              placeholder="e.g. PB-123456"
                              className="w-full glass-input px-3 py-1.5 rounded-xl text-xs font-mono font-bold"
                            />
                          </div>
                        )}

                        <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs py-3 rounded-2xl shadow-md">
                          Disburse & Open Loan Account
                        </button>
                      </form>

                      {/* Loans list Ledger column */}
                      <div className="lg:col-span-8 space-y-4">

                          <div className="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                            <div>
                              <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Select Loan Account ID</label>
                              <select 
                                value={loanRepayId}
                                onChange={(e) => setLoanRepayId(e.target.value)}
                                className="w-full glass-input p-2 rounded-lg text-xs font-mono"

                                  <option key={l.id} value={l.id}>{l.id} - {l.customerName} (Due: ₹{l.remainingAmount})</option>
                                ))}
                              </select>
                            </div>

                            <div>
                              <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Repayment Value (₹)</label>
                              <input 
                                type="number" step="any" required
                                value={loanRepayAmount}
                                onChange={(e) => setLoanRepayAmount(e.target.value)}
                                placeholder="Value (e.g. 1000)"
                                className="w-full glass-input p-2 rounded-lg text-xs font-mono"
                              />
                            </div>

                            <div>
                              <label className="text-[10px] text-gray-400 uppercase font-bold block mb-1">Repay Mode</label>
                              <select 
                                value={loanRepayMode}
                                onChange={(e) => setLoanRepayMode(e.target.value)}
                                className="w-full glass-input p-2 rounded-lg text-xs font-bold"
                              >
                                <option value="Cash">Cash Return</option>
                                <option value="UPI">UPI Return</option>
                                <option value="Passbook">Debit Borrower Passbook Account</option>
                              </select>
                            </div>

                            <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs py-2 rounded-xl h-10 shadow-md">

                          </div>

                            <table className="w-full text-left text-xs text-gray-300">
                              <thead className="text-orange-400 font-bold uppercase">
                                <tr>

                                  <th className="pb-2">Date</th>
                                  <th className="pb-2">Borrower Name</th>
                                  <th className="pb-2">Principal (Int)</th>
                                  <th className="pb-2">Total Payable</th>
                                  <th className="pb-2">Remaining Debt</th>
                                  <th className="pb-2">Status</th>

                              </thead>

                                  <tr><td colSpan="7" className="text-center py-6 text-gray-500 font-bold">No loans registered in current folder.</td></tr>

                                      <td className="py-2.5 text-white font-bold">{l.customerName}</td>
                                      <td className="py-2.5">₹{l.principal} ({l.rate}%)</td>
                                      <td className="py-2.5">₹{(l.totalPayable || 0).toFixed(2)}</td>

                                          {l.status}
                                        </span>
                                      </td>
                                    </tr>
                                  ))
                                )}
                              </tbody>
                            </table>
                          </div>
                        </div>

                      </div>

                    </div>
                  )}

                  {/* SUB SECTION: LENDERS */}
                  {servicesTab === "lenders" && (
                    <div className="glass-panel p-6 rounded-3xl border border-white/5 space-y-4 animate-scale-up">

                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-xs text-gray-300">
                          <thead className="text-orange-400 font-bold uppercase">
                            <tr>
                              <th className="pb-2">Refill Purchase ID</th>
                              <th className="pb-2">Date</th>
                              <th className="pb-2">Wholesale Party</th>
                              <th className="pb-2">Wholesale Total Cost</th>
                              <th className="pb-2">Downpayment Paid</th>
                              <th className="pb-2">Remaining Dues</th>

                          <tbody className="divide-y divide-white/5">
                            {(purchases || []).filter(p => p.dueAmount > 0).length === 0 ? (

                              (purchases || []).filter(p => p.dueAmount > 0).map(p => (
                                <tr key={p.id}>
                                  <td className="py-3 font-mono">{p.id}</td>
                                  <td className="py-3 text-gray-400">{p.date}</td>
                                  <td className="py-3 font-bold text-white">{p.partyName}</td>
                                  <td className="py-3 font-bold">₹{(p.totalCost || 0).toFixed(2)}</td>
                                  <td className="py-3 text-green-400">₹{(p.paidAmount || 0).toFixed(2)}</td>
                                  <td className="py-3 text-red-400 font-extrabold">₹{(p.dueAmount || 0).toFixed(2)}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* SUB SECTION: DEBTORS */}
                  {servicesTab === "debtors" && (
                    <div className="glass-panel p-6 rounded-3xl border border-white/5 space-y-4 animate-scale-up">
                      <h3 className="font-bold text-white text-sm border-b border-white/5 pb-2">Debtors Book</h3>
                      <p className="text-xs text-gray-400">Lists active loan balances and passbook credit lines from local system accounts.</p>
                      <div class="overflow-x-auto">
                        <table className="w-full text-left text-xs text-gray-300">
                          <thead className="text-orange-400 font-bold uppercase">
                            <tr>
                              <th className="pb-2">Borrower Name</th>
                              <th className="pb-2">Contact Details</th>
                              <th className="pb-2">Disbursed Balance</th>
                              <th className="pb-2">Total Interest Payable</th>
                              <th className="pb-2">Active Net Debit Balance</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-white/5">
                            {(loans || []).filter(l => l.status === "Active").length === 0 ? (
                              <tr><td colSpan="5" class="text-center py-6 text-gray-500">No active consumer debt recorded.</td></tr>
                            ) : (
                              (loans || []).filter(l => l.status === "Active").map(l => (
                                <tr key={l.id}>
                                  <td className="py-3 font-extrabold text-white">{l.customerName}</td>
                                  <td className="py-3 font-mono text-gray-400">{l.phone}</td>
                                  <td className="py-3">₹{(l.principal || 0).toFixed(2)}</td>
                                  <td className="py-3 text-orange-300">₹{(l.calculatedInterest || 0).toFixed(2)} ({l.rate}%)</td>
                                  <td className="py-3 text-red-400 font-extrabold font-mono">₹{(l.remainingAmount || 0).toFixed(2)}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                </div>
              )}

              {/* TAB CONTAINER: SALES LOG */}
              {currentTab === "sales" && isSynced && (
                <div className="space-y-6">
                  <h2 className="text-2xl font-black text-white flex items-center gap-2">
                    <Icon name="fileText" className="text-orange-500 w-8 h-8" />
                    Sales Invoices History Ledger
                  </h2>

                  <div className="glass-panel rounded-3xl overflow-hidden border border-white/10">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs text-gray-300">
                        <thead className="bg-white/5 border-b border-white/5 text-orange-400 uppercase font-bold tracking-wider">
                          <tr>
                            <th className="p-4">Txn ID</th>
                            <th className="p-4">Date & Time</th>
                            <th className="p-4">Customer Details</th>
                            <th className="p-4">Payment Method</th>
                            <th className="p-4">Invoice Net Total</th>
                            <th className="p-4">Payment Status</th>
                            <th className="p-4 text-center">Invoice Actions</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {(sales || []).length === 0 ? (
                            <tr><td colSpan="7" class="text-center p-12 text-gray-500">No invoices recorded inside directory database.</td></tr>
                          ) : (
                            sales.map(txn => (
                              <tr key={txn.id} className="hover:bg-white/5">
                                <td className="p-4 font-mono font-bold text-white">{txn.id}</td>
                                <td className="p-4">{txn.date}</td>
                                <td className="p-4">
                                  <p className="font-extrabold text-white">{txn.customerName}</p>
                                  <p className="text-[10px] text-gray-400 font-mono">{txn.customerPhone}</p>
                                </td>
                                <td className="p-4 font-semibold text-orange-400">{txn.paymentMode}</td>
                                <td className="p-4 font-black">₹{(txn.totalAmount || 0).toFixed(2)}</td>
                                <td className="p-4 font-bold">
                                  <span className={`px-2.5 py-1 rounded text-[10px] ${txn.status === 'Success' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                    {txn.status === 'Success' ? 'Success' : 'Rejected'}
                                  </span>
                                </td>
                                <td className="p-4 text-center">
                                  <button 
                                    onClick={() => setActiveReceipt(txn)}
                                    className="bg-orange-500/10 border border-orange-500/20 text-orange-400 hover:bg-orange-500 hover:text-white px-3 py-1.5 rounded-lg font-bold transition-all"
                                  >
                                    View / Reprint Bill
                                  </button>
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB CONTAINER: SYSTEM PREFERENCES */}
              {currentTab === "settings" && (
                <div className="space-y-6 max-w-4xl animate-scale-up">
                  <h2 className="text-2xl font-black text-white flex items-center gap-2">
                    <Icon name="settings" className="text-orange-500 w-8 h-8" />
                    System Preferences & Directories Settings
                  </h2>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                    
                    {/* Left Settings Profile */}
                    <div className="lg:col-span-8 glass-panel p-6 rounded-3xl space-y-6">
                      <h3 className="font-bold text-white text-sm border-b border-white/5 pb-2">Configure Invoice & Store Identity</h3>
                      
                      <div className="space-y-4">
                        {/* Logo Uploading (Canvas compressor active) */}
                        <div className="flex items-center gap-4 p-4 bg-white/5 rounded-2xl border border-white/5">
                          <div className="w-16 h-16 rounded-full overflow-hidden bg-zinc-800 border-2 border-orange-500 flex items-center justify-center shrink-0">
                            {shopConfig.logo ? (
                              <img src={shopConfig.logo} alt="Logo" className="w-full h-full object-cover" />
                            ) : (
                              <Icon name="upload" className="w-8 h-8 text-gray-400" />
                            )}
                          </div>
                          <div>
                            <p className="text-xs font-bold text-white mb-1">Optimized Bill Logo Image</p>
                            <input 
                              type="file" 
                              accept="image/*"
                              onChange={handleLogoUpload}
                              className="text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-orange-500/20 file:text-orange-300 hover:file:bg-orange-500 hover:file:text-white cursor-pointer"
                            />
                            <p className="text-[9px] text-gray-500 mt-1">Logo is automatically scaled to a fast-loading size to prevent blank pages.</p>
                          </div>
                        </div>

                        {/* General Form Inputs */}
                        <div className="grid grid-cols-2 gap-4 text-xs">
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">Store / Business Name *</label>
                            <input 
                              type="text"
                              value={shopConfig.name}
                              onChange={(e) => setShopConfig({ ...shopConfig, name: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">Store Tagline</label>
                            <input 
                              type="text"
                              value={shopConfig.tagline}
                              onChange={(e) => setShopConfig({ ...shopConfig, tagline: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">Billing Address Address *</label>
                            <input 
                              type="text"
                              value={shopConfig.address}
                              onChange={(e) => setShopConfig({ ...shopConfig, address: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">Store Phone Number *</label>
                            <input 
                              type="text"
                              value={shopConfig.phone}
                              onChange={(e) => setShopConfig({ ...shopConfig, phone: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">GSTIN (Optional)</label>
                            <input 
                              type="text"
                              value={shopConfig.gstin}
                              onChange={(e) => setShopConfig({ ...shopConfig, gstin: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            />
                          </div>
                          <div>
                            <label className="text-gray-400 font-bold block mb-1">Primary UPI ID for Live QR Payments</label>
                            <select 
                              value={shopConfig.activeUpiId}
                              onChange={(e) => setShopConfig({ ...shopConfig, activeUpiId: e.target.value })}
                              className="w-full glass-input p-2.5 rounded-xl text-xs"
                            >
                              {(shopConfig.upiIds || []).map((idVal, idIdx) => (
                                <option key={idIdx} value={idVal}>{idVal}</option>
                              ))}
                            </select>
                          </div>
                        </div>

                        {/* UPI ID Management Section */}
                        <div className="border-t border-white/5 pt-4 space-y-2">
                          <label className="text-xs font-bold text-orange-400 uppercase">Manage Merchant UPI Accounts</label>
                          <div className="flex gap-2">
                            <input 
                              type="text"
                              id="newUpiInput"
                              placeholder="e.g. mobile@upi"
                              className="flex-1 glass-input p-2 rounded-lg text-xs font-mono"
                            />
                            <button 
                              type="button"
                              onClick={() => {
                                const val = document.getElementById("newUpiInput").value;
                                if (val) {
                                  const updatedUpiList = [...(shopConfig.upiIds || []), val];
                                  setShopConfig({ ...shopConfig, upiIds: updatedUpiList, activeUpiId: val });
                                  document.getElementById("newUpiInput").value = "";
                                  triggerToast("UPI ID Added!", "success");
                                }
                              }}
                              className="bg-orange-500 hover:bg-orange-600 text-white px-4 rounded-lg text-xs font-bold"
                            >
                              Add UPI
                            </button>
                          </div>
                          <div className="flex flex-wrap gap-2 pt-2">
                            {(shopConfig.upiIds || []).map(idVal => (
                              <div key={idVal} className="flex items-center gap-2 bg-white/5 border border-white/10 px-3 py-1 rounded-lg text-[10px] font-mono">
                                <span className={shopConfig.activeUpiId === idVal ? 'text-green-400 font-bold' : 'text-gray-400'}>{idVal}</span>
                                <button 
                                  type="button" 
                                  onClick={async () => {
                                    const proceed = await triggerCustomConfirm("Delete UPI ID?", `Remove ${idVal}?`);
                                    if (proceed) {
                                      const updated = (shopConfig.upiIds || []).filter(v => v !== idVal);
                                      setShopConfig({ ...shopConfig, upiIds: updated, activeUpiId: updated[0] || "" });
                                    }
                                  }}
                                  className="text-red-400 hover:text-red-300 ml-1"
                                >
                                  ×
                                </button>
                              </div>
                            ))}
                          </div>
                        </div>

                        <button 
                          onClick={async () => {
                            await syncChanges(null, null, shopConfig, null, null, null);
                            triggerToast("Shop Configuration committed to local drive!", "success");
                          }}
                          disabled={!isSynced}
                          className="bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold py-2.5 px-6 rounded-xl disabled:opacity-40"
                        >
                          Save Credentials & Configuration
                        </button>
                      </div>
                    </div>

                    {/* Right Settings (Custom Categories) */}
                    <div className="lg:col-span-4 glass-panel p-6 rounded-3xl space-y-4">
                      <h3 className="font-bold text-white text-sm border-b border-white/5 pb-2">Custom Categories</h3>
                      
                      <form onSubmit={handleAddCategory} className="flex gap-2">
                        <input 
                          type="text" required
                          placeholder="Category name"
                          value={newCategoryInput}
                          onChange={(e) => setNewCategoryInput(e.target.value)}
                          className="flex-1 glass-input px-3 py-1.5 rounded-xl text-xs"
                        />
                        <button type="submit" className="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold">Add</button>
                      </form>

                      <div className="space-y-1.5 max-h-48 overflow-y-auto no-scrollbar pr-1">
                        {(shopConfig.customCategories || []).map(cat => (
                          <div key={cat} className="flex justify-between items-center bg-white/5 border border-white/5 p-2 rounded-xl text-xs">
                            <span className="text-white font-bold">{cat}</span>
                            <button onClick={() => handleDeleteCategory(cat)} className="text-red-400 hover:text-red-300">Delete</button>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              )}

            </main>
          </div>

          {/* ==========================================
              TOP-RIGHT TRANSACTIONS SUCCESS / CANCEL CORNER NOTIFICATION TOAST
             ========================================== */}
          {cornerAnimation && (
            <div className="fixed top-20 right-6 z-50 max-w-sm w-full animate-scale-up">
              <div className={`p-5 rounded-2xl shadow-2xl border ${cornerAnimation.type === 'Success' ? 'bg-green-500/10 border-green-500/20 text-green-300' : 'bg-red-500/10 border-red-500/20 text-red-300'} backdrop-blur-xl space-y-2`}>
                <div className="flex items-center justify-between">
                  <h4 className="text-xs font-black tracking-wider uppercase">{cornerAnimation.title}</h4>
                  <span className={`text-[10px] px-2 py-0.5 rounded font-mono font-bold ${cornerAnimation.type === 'Success' ? 'bg-green-500/20' : 'bg-red-500/20'}`}>
                    {cornerAnimation.type === 'Success' ? 'APPROVED' : 'CANCELLED'}
                  </span>
                </div>
                <p className="text-2xl font-black font-mono">{cornerAnimation.amount}</p>
                <div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                  <div className={`h-full ${cornerAnimation.type === 'Success' ? 'bg-green-500' : 'bg-red-500'} animate-pulse`} style={{width: '100%'}}></div>
                </div>
              </div>
            </div>
          )}

          {/* ==========================================
              INVENTORY MANAGEMENT: CREATE / EDIT DIALOG MODAL
             ========================================== */}
          {isProductModalOpen && editingProduct && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-6">
              <div className="max-w-xl w-full glass-panel p-6 rounded-3xl border border-white/15 shadow-2xl flex flex-col max-h-[90vh] overflow-y-auto no-scrollbar">
                
                <div class="flex justify-between items-center pb-3 border-b border-white/10">
                  <h3 className="font-extrabold text-white text-lg">
                    {editingProduct.id ? "Edit Product Credentials" : "Add New Stock Item"}
                  </h3>
                  <button onClick={() => setIsProductModalOpen(false)} className="text-gray-400 hover:text-white">
                    <Icon name="x" />
                  </button>
                </div>

                <form onSubmit={saveProductDetails} className="space-y-4 mt-4 text-xs">
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Product Name *</label>
                      <input 
                        type="text" required
                        value={editingProduct.name}
                        onChange={(e) => setEditingProduct({ ...editingProduct, name: e.target.value })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                      />
                    </div>

                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Category *</label>
                      <select 
                        value={editingProduct.category}
                        onChange={(e) => setEditingProduct({ ...editingProduct, category: e.target.value })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                      >
                        {shopConfig.customCategories.map(cat => (
                          <option key={cat} value={cat}>{cat}</option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Base Measuring Unit *</label>
                      <input 
                        type="text" required
                        value={editingProduct.baseUnit}
                        onChange={(e) => setEditingProduct({ ...editingProduct, baseUnit: e.target.value })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                        placeholder="e.g. kg, Liter, Piece"
                      />
                    </div>

                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Base Price Rate (₹) *</label>
                      <input 
                        type="number" step="any" required
                        value={editingProduct.basePrice}
                        onChange={(e) => setEditingProduct({ ...editingProduct, basePrice: parseFloat(e.target.value) || 0 })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                      />
                    </div>

                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Initial Stock Level *</label>
                      <input 
                        type="number" step="any" required
                        value={editingProduct.stock}
                        onChange={(e) => setEditingProduct({ ...editingProduct, stock: parseFloat(e.target.value) || 0 })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                      />
                    </div>

                    <div>
                      <label className="text-gray-300 font-bold block mb-1">Minimum Alert Level</label>
                      <input 
                        type="number" step="any"
                        value={editingProduct.minStock}
                        onChange={(e) => setEditingProduct({ ...editingProduct, minStock: parseFloat(e.target.value) || 0 })}
                        className="w-full glass-input p-2.5 rounded-xl text-xs"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-gray-300 font-bold block mb-1">Product Photo URL (Optional)</label>
                    <input 
                      type="text"
                      value={editingProduct.imageUrl}
                      onChange={(e) => setEditingProduct({ ...editingProduct, imageUrl: e.target.value })}
                      placeholder="https://..."
                      className="w-full glass-input p-2.5 rounded-xl text-xs"
                    />
                  </div>

                  <div className="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-3">
                    <div className="flex justify-between items-center">
                      <div>
                        <label className="font-bold text-white block">Fractional Subunit System</label>
                        <p className="text-[9px] text-gray-400 mt-0.5">Allows conversions during POS terminal weighing checks.</p>
                      </div>
                      <input 
                        type="checkbox"
                        checked={editingProduct.hasSubUnit}
                        onChange={(e) => setEditingProduct({ ...editingProduct, hasSubUnit: e.target.checked })}
                        className="w-4 h-4 rounded text-orange-500 focus:ring-orange-500"
                      />
                    </div>

                    {editingProduct.hasSubUnit && (
                      <div className="grid grid-cols-2 gap-3 pt-2 border-t border-white/5 animate-scale-up">
                        <div>
                          <label className="text-[10px] text-gray-300 block mb-1">Sub-unit Name</label>
                          <input 
                            type="text"
                            value={editingProduct.subUnitName}
                            onChange={(e) => setEditingProduct({ ...editingProduct, subUnitName: e.target.value })}
                            placeholder="e.g. gram, ml"
                            className="w-full glass-input p-2 rounded-lg text-xs"
                          />
                        </div>
                        <div>
                          <label className="text-[10px] text-gray-300 block mb-1">Conversion Factor</label>
                          <input 
                            type="number"
                            value={editingProduct.subUnitFactor}
                            onChange={(e) => setEditingProduct({ ...editingProduct, subUnitFactor: parseFloat(e.target.value) || 1 })}
                            placeholder="e.g. 1000"
                            className="w-full glass-input p-2 rounded-lg text-xs font-mono"
                          />
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-2 justify-end pt-3 border-t border-white/5">
                    <button type="button" onClick={() => setIsProductModalOpen(false)} className="px-4 py-2 bg-white/5 text-gray-300 rounded-xl font-bold">Cancel</button>
                    <button type="submit" className="px-5 py-2 bg-orange-500 text-white rounded-xl font-bold">Save Details</button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* ==========================================
              INVOICE PREVIEW & ACTIONS MODAL
             ========================================== */}
          {activeReceipt && (
            <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-6 overflow-y-auto">
              <div className="max-w-2xl w-full bg-white text-black rounded-3xl shadow-2xl relative flex flex-col my-8 animate-scale-up">
                
                {/* Printable Frame Area */}
                <div id="print-area" className="p-8 space-y-6 flex-1 relative">
                  
                  {/* Status Stamped Watermarks if Cancelled */}
                  {activeReceipt.status === "Cancelled" && (
                    <div className="watermark-rejected">REJECTED</div>
                  )}

                  {/* Header metadata */}
                  <div className="flex justify-between items-start pb-6 border-b border-gray-200">
                    <div>
                      {shopConfig.logo ? (
                        <img src={shopConfig.logo} alt="Logo" className="w-16 h-16 rounded-full object-cover mb-2 border border-gray-200" />
                      ) : (
                        <div className="w-14 h-14 rounded-full bg-orange-500 text-white flex items-center justify-center font-extrabold text-2xl mb-2">
                          {shopConfig.name ? shopConfig.name.charAt(0).toUpperCase() : "O"}
                        </div>
                      )}
                      <h2 className="text-2xl font-black tracking-tight text-orange-500">{shopConfig.name}</h2>
                      <p className="text-xs text-gray-500 font-medium italic">{shopConfig.tagline}</p>
                    </div>
                    <div className="text-right">
                      <h3 className="text-3xl font-black text-gray-300 tracking-wider">INVOICE BILL</h3>
                      {shopConfig.gstin && <p className="text-[10px] text-gray-500 font-bold">GSTIN: {shopConfig.gstin}</p>}
                      <p className="text-[10px] text-gray-500 font-mono">VPA Address: {shopConfig.activeUpiId}</p>
                    </div>
                  </div>

                  {/* Metadata coordinates */}
                  <div className="grid grid-cols-2 gap-4 text-xs pt-4">
                    <div>
                      <p className="font-bold text-gray-400 uppercase tracking-wider">BILLED TO:</p>
                      <p className="font-black text-black text-sm mt-1">{activeReceipt.customerName}</p>
                      <p className="text-gray-500">Phone: {activeReceipt.customerPhone}</p>
                    </div>
                    <div className="text-right">
                      <p className="font-bold text-gray-400 uppercase tracking-wider">BILL METADATA:</p>
                      <p className="font-mono text-black font-bold mt-1">Bill No: {activeReceipt.id}</p>
                      <p className="text-gray-500">Date: {activeReceipt.date}</p>
                      <p className="text-gray-500">Payment Mode: {activeReceipt.paymentMode}</p>
                    </div>
                  </div>

                  {/* Dynamic Items Table */}
                  <table className="w-full text-left text-xs border-collapse mt-6">
                    <thead>
                      <tr className="border-b-2 border-dashed border-gray-300 text-gray-500 font-bold uppercase">
                        <th className="py-2">Item Details</th>
                        <th className="py-2">Checkout Rate</th>
                        <th className="py-2">Billed Quantity</th>
                        <th className="py-2 text-right">Sum Net Amount</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100 font-semibold">
                      {(activeReceipt.items || []).map((it, idx) => (
                        <tr key={idx}>
                          <td className="py-3 font-bold text-black">{it.name}</td>
                          <td className="py-3 text-gray-500 font-mono">{it.rate}</td>
                          <td className="py-3 text-gray-800 font-mono">{it.quantity} {it.unit}</td>
                          <td className="py-3 text-right font-bold text-black font-mono">₹{(it.price || 0).toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  {/* Calculations summary column */}
                  <div className="border-t-2 border-dashed border-gray-300 pt-4 space-y-2 text-xs">
                    <div className="flex justify-between text-gray-500 font-mono">
                      <span>SGST (2.5%):</span>
                      <span>₹{((activeReceipt.taxAmount || 0) / 2).toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-gray-500 font-mono">
                      <span>CGST (2.5%):</span>
                      <span>₹{((activeReceipt.taxAmount || 0) / 2).toFixed(2)}</span>
                    </div>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-200 text-sm font-black text-black">
                      <span>Grand Net Total:</span>
                      <span className="text-xl font-black text-orange-500 font-mono">₹{(activeReceipt.totalAmount || 0).toFixed(2)}</span>
                    </div>
                  </div>

                  {/* Dynamic UPI Payment QR rendering (UPI QR only printed if active UPI payment exists) */}
                  {activeReceipt.paymentMode === "UPI" && activeReceipt.status === "Success" && (
                    <div className="pt-6 flex flex-col items-center justify-center border-t border-dashed border-gray-200 gap-2">
                      <div className="p-2 border-2 border-dashed border-gray-300 rounded-2xl bg-white">
                        <img 
                          src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=upi://pay?pa=${shopConfig.activeUpiId}&pn=${encodeURIComponent(shopConfig.name)}&am=${activeReceipt.totalAmount}&cu=INR`} 
                          alt="Payment QR" 
                          className="w-28 h-28"
                        />
                      </div>
                      <p className="text-[9px] text-gray-500 uppercase font-extrabold tracking-wider font-mono">Scan QR code using GPay, PhonePe, Paytm or BHIM UPI</p>
                    </div>
                  )}

                  <div className="text-center pt-6 border-t border-gray-200 text-[10px] text-gray-400 uppercase font-bold">
                    <p className="text-black">Thank you for shopping with us!</p>
                    <p className="mt-1 font-light font-mono italic">Terms: All sales details are printed securely using local systems.</p>
                  </div>

                </div>

                {/* STICKY MODAL PRINT OPTIONS HUB - RELOCATED TO BOTTOM */}
                <div className="no-print p-4 bg-zinc-950 text-white rounded-b-3xl border-t border-white/10 flex flex-wrap gap-2 justify-between items-center">
                  
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setReceiptLayout("A4")}
                      className={`px-3 py-1.5 rounded-xl text-xs font-bold ${receiptLayout === 'A4' ? 'bg-orange-500 text-white' : 'bg-white/10 text-gray-300'}`}
                    >
                      A4 Layout
                    </button>
                    <button 
                      onClick={() => setReceiptLayout("Thermal")}
                      className={`px-3 py-1.5 rounded-xl text-xs font-bold ${receiptLayout === 'Thermal' ? 'bg-orange-500 text-white' : 'bg-white/10 text-gray-300'}`}
                    >
                      3" Thermal Layout
                    </button>
                  </div>

                  <div className="flex gap-2">
                    <button 
                      onClick={() => {
                        const messageText = `*${shopConfig.name} - INVOICE BILL*%0A` +
                          `Invoice: ${activeReceipt.id}%0A` +
                          `Date: ${activeReceipt.date}%0A` +
                          `Customer: ${activeReceipt.customerName}%0A` +
                          `*Total: ₹${(activeReceipt.totalAmount || 0).toFixed(2)}*%0A` +
                          `Thank you for patronizing us!`;
                        window.open(`https://api.whatsapp.com/send?text=${messageText}`, '_blank');
                      }}
                      className="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded-xl text-xs font-bold"
                    >
                      Send via WhatsApp
                    </button>
                    
                    <button 
                      onClick={() => window.print()}
                      className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-1.5 rounded-xl text-xs font-extrabold flex items-center gap-1"
                    >
                      <Icon name="printer" className="w-4 h-4" />
                      Print Bill
                    </button>

                    <button 
                      onClick={() => setActiveReceipt(null)}
                      className="bg-white/10 hover:bg-white/20 text-white px-4 py-1.5 rounded-xl text-xs font-bold"
                    >
                      Close Window
                    </button>
                  </div>

                </div>

              </div>
            </div>
          )}

          {/* ==========================================
              CENTRALIZED CUSTOM GLASS DIALOG PORTAL (REPLACES CHROME POPUPS)
             ========================================== */}
          {customDialog && (
            <div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-md flex items-center justify-center p-6">
              <div className="max-w-md w-full glass-panel-orange p-6 rounded-3xl border border-orange-500/30 shadow-2xl space-y-4 animate-scale-up">
                
                <div>
                  <h4 className="text-sm font-black text-orange-400 uppercase tracking-wider">{customDialog.title}</h4>
                  <p className="text-xs text-white mt-2 leading-relaxed">{customDialog.message}</p>
                </div>

                {/* Prompt value field if dialog is prompt/password */}
                {(customDialog.type === 'prompt' || customDialog.type === 'password') && (
                  <div>
                    <input 
                      type={customDialog.type === 'password' ? 'password' : 'text'}
                      id="dialogValueInput"
                      placeholder={customDialog.placeholder || "Enter value..."}
                      defaultValue={customDialog.defaultValue || ""}
                      className="w-full glass-input px-3 py-2 rounded-xl text-xs font-mono font-bold"
                      autoFocus
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') {
                          customDialog.onResolve(document.getElementById("dialogValueInput").value);
                        }
                      }}
                    />
                  </div>
                )}

                <div className="flex gap-2 justify-end pt-2 border-t border-white/5">
                  {customDialog.type !== 'alert' && (
                    <button 
                      onClick={() => customDialog.onReject()}
                      className="px-4 py-1.5 rounded-lg text-xs font-bold bg-white/5 text-gray-300 hover:bg-white/10"
                    >
                      Cancel
                    </button>
                  )}
                  <button 
                    onClick={() => {
                      if (customDialog.type === 'prompt' || customDialog.type === 'password') {
                        customDialog.onResolve(document.getElementById("dialogValueInput").value);
                      } else {
                        customDialog.onResolve();
                      }
                    }}
                    className="px-5 py-1.5 rounded-lg text-xs font-bold bg-orange-500 text-white hover:bg-orange-600"
                  >
                    Confirm
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* ==========================================
              SYSTEM DYNAMIC NOTIFICATION IN-APP TOAST
             ========================================== */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-50 animate-scale-up">
              <div className={`px-5 py-3.5 rounded-2xl flex items-center gap-3 shadow-2xl border ${
                toast.type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-300' :
                toast.type === 'warning' ? 'bg-amber-500/10 border-amber-500/20 text-amber-300' :
                'bg-red-500/10 border-red-500/20 text-red-300'
              } backdrop-blur-md`}>
                <Icon name={toast.type === 'success' ? 'check' : 'info'} />
                <span className="text-xs font-bold font-sans">{toast.message}</span>
              </div>
            </div>
          )}

          {showPermissionPrompt && (
            <div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-xl flex items-center justify-center p-6">
              <div className="max-w-md w-full glass-panel border border-orange-500/30 p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center gap-6 animate-scale-up">
                <div className="w-20 h-20 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400 border border-orange-500/30">
                  <Icon name="shield" className="w-10 h-10 animate-bounce" />
                </div>
                <div>
                  <h3 className="text-xl font-bold text-white mb-2">Local File Access Permission</h3>
                  <p className="text-xs text-gray-300 leading-relaxed">
                    OrangeGlass POS requires permission to access your local data folder to restore previous registers and log sales.
                  </p>
                </div>
                <div className="flex gap-3 w-full">
                  <button onClick={disconnectFolder} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 text-xs py-3 rounded-xl border border-white/10 font-bold">Disconnect</button>
                  <button onClick={() => loadDataFromFolder(dirHandle)} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-xs py-3 rounded-xl font-bold shadow-lg">Grant Authorization</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render Portal
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
