<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        /* Wifi Logo Animation */
        .wifi-loader {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            position: relative;
        }

        .wifi-symbol {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #3498db;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .wifi-arc {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: wave 1.5s infinite;
        }

        .arc-1 { width: 30px; height: 30px; animation-delay: 0.2s; }
        .arc-2 { width: 50px; height: 50px; animation-delay: 0.4s; }
        .arc-3 { width: 70px; height: 70px; animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes wave {
            0% { border-top-color: #bdc3c7; }
            50% { border-top-color: #3498db; }
            100% { border-top-color: #bdc3c7; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wifi-loader">
            <div class="wifi-symbol"></div>
            <div class="wifi-arc arc-1"></div>
            <div class="wifi-arc arc-2"></div>
            <div class="wifi-arc arc-3"></div>
        </div>
        <h1>System Maintenance</h1>
        <p>We are currently updating our servers to improve your experience. We will be back online shortly!</p>
    </div>

</body>
</html>
