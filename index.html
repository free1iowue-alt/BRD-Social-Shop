<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Services</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* AR Logo Styling */
        .logo-container {
            margin-bottom: 2rem;
        }

        .ar-logo {
            width: 100px;
            height: 100px;
            /* Gradient fallback background */
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 20px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        .ar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 3rem;
        }

        /* --- Nice Circular Loader Design --- */
        .circle-loader-box {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-loader-box svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* Rotates starting point to the top */
        }

        /* The grey background track */
        .circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 12px;
        }

        /* The glowing neon loading arc */
        .circle-progress {
            fill: none;
            stroke: url(#cyan-gradient);
            stroke-width: 12px;
            stroke-linecap: round;
            /* 2 * PI * Radius (r=85) = ~534 */
            stroke-dasharray: 534;
            stroke-dashoffset: 534;
            animation: spinCircle 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0px 0px 8px rgba(0, 242, 254, 0.8));
        }

        /* Percentage text inside the circle */
        .loading-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00f2fe;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* Animations */
        @keyframes spinCircle {
            0% {
                stroke-dashoffset: 534;
            }
            50% {
                stroke-dashoffset: 130; /* Fills up to roughly 75% */
            }
            100% {
                stroke-dashoffset: 0; /* Completes loop */
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="ar-logo">
                <!-- Replace 'your-logo-url.png' with your actual image path -->
                <img src="your-logo-url.png" alt="AR" onerror="this.style.display='none'">
                AR
            </div>
        </div>

        <!-- Heading Text -->
        <h1>Stay Tuned</h1>
        <p>Our server will be soon.</p>

        <!-- Nice Round Circle Loader -->
        <div class="circle-loader-box">
            <svg>
                <defs>
                    <!-- Gradient for the loading stroke -->
                    <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f2fe" />
                        <stop offset="100%" stop-color="#4facfe" />
                    </linearGradient>
                </defs>
                <!-- Background Ring -->
                <circle class="circle-bg" cx="100" cy="100" r="85"></circle>
                <!-- Animated Progress Ring -->
                <circle class="circle-progress" cx="100" cy="100" r="85"></circle>
            </svg>
            <!-- Center Text -->
            <div class="loading-text" id="percentage">0%</div>
        </div>
    </div>

    <!-- Simple JavaScript to make the percentage numbers count up dynamically with the circle -->
    <script>
        const percentText = document.getElementById('percentage');
        let count = 0;
        
        setInterval(() => {
            count++;
            if (count > 100) {
                count = 0; // Reset loop matching the CSS animation
            }
            percentText.innerText = count + "%";
        }, 38); // Timed to closely match the 4-second CSS cycle
    </script>

</body>
</html>
